name: 🛠️ Build GKI Kernels

on:
  workflow_dispatch:
    inputs:
      build_target:
        description: 'Which Android-Kernel combination to build?'
        required: true
        type: choice
        options:
          - all
          - a12-5.10
          - a13-5.10
          - a13-5.15
          - a14-5.15
          - a14-6.1
          - a15-6.6
          - a16-6.12
        default: 'a15-6.6'
      ksu_type:
        description: 'KernelSU Variant'
        required: true
        type: choice
        options:
          - KSUN
          - KSU
        default: 'KSUN'
      ksu_branch_or_hash:
        description: 'KSU branch or commit hash (empty = dev/main)'
        required: false
        type: string
        default: ''
      susfs_branch_or_hash:
        description: 'SUSFS branch or commit hash (empty = auto-detect)'
        required: false
        type: string
        default: ''
      optimize_level:
        description: 'Compiler optimization level'
        required: true
        type: choice
        options:
          - O2
          - O3
        default: 'O2'
      clean_build:
        description: 'Force clean build (bypass ccache)'
        required: true
        type: boolean
        default: false
      
      # 🛡️ Feature Flags
      feature_susfs:
        description: 'Enable SUSFS (Root Hiding)'
        required: true
        type: boolean
        default: true
      feature_bbg:
        description: 'Enable Baseband Guard (BBG)'
        required: true
        type: boolean
        default: true
      feature_bbr:
        description: 'Enable BBR Congestion Control'
        required: true
        type: boolean
        default: true
      feature_ttl:
        description: 'Enable TTL Target'
        required: true
        type: boolean
        default: true
      feature_ip_set:
        description: 'Enable IP_SET & IPv6 NAT'
        required: true
        type: boolean
        default: true
      feature_unicode:
        description: 'Enable Unicode Bypass Fix'
        required: true
        type: boolean
        default: true
      feature_ds:
        description: 'Enable Droidspaces'
        required: true
        type: boolean
        default: true
      feature_ntsync:
        description: 'Enable NTSync'
        required: true
        type: boolean
        default: true

jobs:
  set-matrix:
    runs-on: ubuntu-latest
    outputs:
      build_matrix: ${{ steps.generate.outputs.matrix }}
      has_builds: ${{ steps.generate.outputs.has_builds }}
      ksu_resolved_hash: ${{ steps.resolve-hashes.outputs.ksu_hash }}
    steps:
      - uses: actions/checkout@v4
      
      - name: Generate Matrix
        id: generate
        shell: bash
        run: |
          set -euo pipefail
          
          # Initialize empty JSON array
          JSON_ARRAY="[]"
          
          # Determine which files to process
          TARGET="${{ inputs.build_target }}"
          if [ "$TARGET" = "all" ]; then
            FILES=(.github/kernel-config/*.json)
          else
            FILES=(".github/kernel-config/${TARGET}.json")
          fi
          
          for file in "${FILES[@]}"; do
            if [ -f "$file" ]; then
              echo "Processing $file"
              # Extract array and merge
              JSON_ARRAY=$(jq -s '.[0] + .[1].include' <<< "$JSON_ARRAY $(cat $file)")
            fi
          done
          
          # Check if empty
          COUNT=$(echo "$JSON_ARRAY" | jq 'length')
          if [ "$COUNT" -eq 0 ]; then
            echo "has_builds=false" >> $GITHUB_OUTPUT
            echo "::error::No kernel configurations found for target $TARGET"
            exit 1
          fi
          
          # Output matrix
          echo "has_builds=true" >> $GITHUB_OUTPUT
          MATRIX_JSON=$(jq -c '.' <<< "$JSON_ARRAY")
          echo "matrix={\"include\":$MATRIX_JSON}" >> $GITHUB_OUTPUT
          echo "Generated matrix: $MATRIX_JSON"

      - name: Resolve KSU Hash
        id: resolve-hashes
        shell: bash
        run: |
          # Fetch the exact commit hash for reproducible builds
          KSU_TYPE="${{ inputs.ksu_type }}"
          INPUT_HASH="${{ inputs.ksu_branch_or_hash }}"
          
          if [ "$KSU_TYPE" = "KSUN" ]; then
            REPO="pratikkabra143/KernelSU-Next"
            DEFAULT_BRANCH="dev"
          else
            REPO="tiann/KernelSU"
            DEFAULT_BRANCH="main"
          fi
          
          REF="${INPUT_HASH:-$DEFAULT_BRANCH}"
          
          echo "Resolving KSU hash for $REPO @ $REF"
          # Get commit hash via GitHub API
          HASH=$(curl -s -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
            "https://api.github.com/repos/$REPO/commits/$REF" | jq -r '.sha')
            
          if [ "$HASH" = "null" ] || [ -z "$HASH" ]; then
            echo "::warning::Failed to resolve exact hash, will use ref: $REF"
            echo "ksu_hash=$REF" >> $GITHUB_OUTPUT
          else
            echo "ksu_hash=$HASH" >> $GITHUB_OUTPUT
            echo "Resolved KSU: $HASH"
          fi

  build:
    needs: set-matrix
    if: ${{ needs.set-matrix.outputs.has_builds == 'true' }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix: ${{ fromJSON(needs.set-matrix.outputs.build_matrix) }}
    
    steps:
      - name: Free Disk Space
        uses: jlumbroso/free-disk-space@main
        with:
          tool-cache: true
          android: true
          dotnet: true
          haskell: true
          large-packages: true
          docker-images: true
          swap-storage: true
          
      - name: 📥 Checkout Code
        uses: actions/checkout@v4
        
      - name: 🧹 Emergency Disk Cleanup
        uses: ./.github/actions/disk-cleanup
        
      - name: Install Minimal Dependencies
        run: |
          set -euo pipefail
          echo "::group::Install dependencies"
          sudo apt-get -o Acquire::Retries=3 update -qq
          sudo DEBIAN_FRONTEND=noninteractive apt-get install -y --no-install-recommends \
            git curl ca-certificates build-essential clang lld flex bison \
            libelf-dev libssl-dev libncurses-dev zlib1g-dev liblz4-tool \
            libxml2-utils rsync unzip dwarves file python3 ccache jq bc dos2unix kmod libdw-dev elfutils pigz aria2
          sudo apt-get clean
          echo "✅ Dependencies installed"
          echo "::endgroup::"

      - name: Install ccache with ECS by cctv18
        run: |
          set -euo pipefail
          echo "::group::Install ccache with ECS"
          curl -LfsS --retry 5 --retry-delay 5 --retry-all-errors --connect-timeout 30 --tcp-fastopen -H "User-Agent: Mozilla/5.0" "https://github.com/WildKernels/kernel_patches/raw/refs/heads/main/ccache/ccache-x86-64" -o ccache
          sudo cp -f ./ccache /usr/bin/ccache
          sudo chmod +x /usr/bin/ccache
          rm -f ./ccache
          echo "[DEBUG] Ccache version : $(ccache --version)"
          echo "::endgroup::"

      - name: ♻️ Configure ccache & LTO cache (bounded)
        run: |
          echo "::group::Configure ccache environment"
          set -euo pipefail
          if command -v ccache >/dev/null 2>&1; then
            CACHE_DIR="${{ github.workspace }}/.ccache"
            LDCACHE_DIR="${{ github.workspace }}/.ld_cache"
            CCACHE_LOG="${{ github.workspace }}/ccache.log"
            mkdir -p "$CACHE_DIR"
            mkdir -p "$LDCACHE_DIR"
            
            SETTINGS=(
              "CCACHE_DIR=$CACHE_DIR"
              "LDCACHE_DIR=$LDCACHE_DIR"
              "CCACHE_MAXSIZE=12G"
              "CCACHE_COMPILERCHECK=content"
              "CCACHE_BASEDIR=${GITHUB_WORKSPACE}"
              "CCACHE_NOHASHDIR=true"
              "CCACHE_IGNOREOPTIONS=--sysroot*"
              "CCACHE_COMPRESSION=true"
              "CCACHE_COMPRESSION_LEVEL=3"
              "CCACHE_DIRECT=true"
              "CCACHE_FILE_CLONE=true"
              "CCACHE_LOGFILE=$CCACHE_LOG"
            )
            for setting in "${SETTINGS[@]}"; do
              export "$setting"
              echo "$setting" >> $GITHUB_ENV
            done
            ccache -z
            echo "✅ ccache configured"
          fi
          echo "::endgroup::"
          
      - name: ♻️ Restore ccache & LTO cache
        if: ${{ inputs.clean_build == false }}
        uses: ./.github/actions/cache/restore
        with:
          key_prefix: "gki-${{ matrix.kernel_version }}"
          
      - name: Parse Branch and Set ENV
        run: |
          KVER="${{ matrix.kernel_version }}"
          IFS='-' read -ra PARTS <<< "$KVER"
          VERSION_SUBLEVEL="${PARTS[0]}"
          IFS='.' read -ra VPARTS <<< "$VERSION_SUBLEVEL"
          VERSION_MAJOR="${VPARTS[0]}.${VPARTS[1]}"
          ANDROID_VER="${PARTS[1]}"
          if [ "${PARTS[2]}" = "lts" ]; then
            BRANCH="common-${ANDROID_VER}-${VERSION_MAJOR}"
          elif [ "${PARTS[2]}" = "release" ]; then
            BRANCH="common-${ANDROID_VER}-${VERSION_MAJOR}-release"
          else
            BRANCH="common-${ANDROID_VER}-${VERSION_MAJOR}-${PARTS[2]}-${PARTS[3]}"
          fi
          echo "BRANCH=$BRANCH" >> $GITHUB_ENV
          
      - name: 📥 Sync Kernel Source
        uses: ./.github/actions/kernel-source-sync
        with:
          source_location: "${{ github.workspace }}/gki_workspace"
          github_token: ${{ secrets.GITHUB_TOKEN }}
          debug: false
          
      - name: Build Kernel
        env:
          BOOT_SIGN_KEY: ${{ secrets.BOOT_SIGN_KEY }}
        uses: ./.github/actions/build-kernel
        with:
          kernel_version: ${{ matrix.kernel_version }}
          ksu_type: ${{ inputs.ksu_type }}
          ksu_hash: ${{ needs.set-matrix.outputs.ksu_resolved_hash }}
          susfs_hash: ${{ inputs.susfs_branch_or_hash }}
          optimize_level: ${{ inputs.optimize_level }}
          clean_build: ${{ inputs.clean_build }}
          feature_susfs: ${{ inputs.feature_susfs }}
          feature_bbg: ${{ inputs.feature_bbg }}
          feature_bbr: ${{ inputs.feature_bbr }}
          feature_ttl: ${{ inputs.feature_ttl }}
          feature_ip_set: ${{ inputs.feature_ip_set }}
          feature_unicode: ${{ inputs.feature_unicode }}
          feature_ds: ${{ inputs.feature_ds }}
          feature_ntsync: ${{ inputs.feature_ntsync }}
          
      - name: 💾 Save ccache & LTO cache
        if: always() && inputs.clean_build == false
        uses: ./.github/actions/cache/save
        with:
          key_prefix: "gki-${{ matrix.kernel_version }}"

  release:
    needs: build
    runs-on: ubuntu-latest
    if: ${{ always() }}
    steps:
      - uses: actions/checkout@v4
      
      - name: Download Artifacts
        uses: actions/download-artifact@v4
        with:
          path: ./downloaded-artifacts
      
      - name: Prepare Release Name
        run: |
          DATE=$(date -u '+%Y%m%d_%H%M%S')
          echo "NEW_TAG=v$DATE" >> $GITHUB_ENV
          echo "RELEASE_NAME=GKI Kernel Release ($DATE)" >> $GITHUB_ENV
      
      - name: Create Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          cat << EOF > release_notes.md
          # 🎯 GKI Kernels with KernelSU & SUSFS
          
          > **Build Date:** $(date -u '+%Y-%m-%d %H:%M:%S UTC')  
          > **Build ID:** \`${{ github.run_id }}\`  
          > **Workflow:** [\`${{ github.workflow }}\`](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})
          
          ---
          
          ## 📦 Build Configuration
          
          | Component | Version/Setting |
          |-----------|----------------|
          | **KernelSU Variant** | \`${{ inputs.ksu_type }}\` |
          | **Optimization Level** | \`${{ inputs.optimize_level }}\` |
          | **Clean Build** | \`${{ inputs.clean_build }}\` |
          
          ---
          
          ## ✨ Features & Capabilities
          
          ### 🔐 Root Management
          EOF
          if [ "${{ inputs.ksu_type }}" == "KSUN" ]; then
            cat << EOF >> release_notes.md
          - **KernelSU Next** - Next-generation kernel-level root solution
          EOF
          elif [ "${{ inputs.ksu_type }}" == "KSU" ]; then
            cat << EOF >> release_notes.md
          - **KernelSU** - Kernel-level root solution
          EOF
          fi
          
          if [ "${{ inputs.feature_susfs }}" == "true" ]; then
            cat << EOF >> release_notes.md
          - **SUSFS** - Advanced hiding and security features
          EOF
          fi
          
          cat << EOF >> release_notes.md
          ### 🛡️ Security & Privacy
          EOF
          
          if [ "${{ inputs.feature_bbg }}" == "true" ]; then
            cat << EOF >> release_notes.md
          - **Baseband Guard (BBG)** - LSM-based baseband security
          EOF
          fi
          
          if [ "${{ inputs.feature_susfs }}" == "true" ]; then
            cat << EOF >> release_notes.md
          - **SUSFS Hide Features**:
            - ✅ SUS_PATH - Hide suspicious paths
            - ✅ SUS_MOUNT - Hide mount points
            - ✅ SUS_KSTAT - Spoof kernel statistics
            - ✅ SPOOF_UNAME - Kernel version spoofing
            - ✅ SPOOF_CMDLINE - Boot parameters spoofing
            - ✅ OPEN_REDIRECT - File access redirection
            - ✅ SUS_MAP - Memory mapping protection
          EOF
          fi
          
          if [ "${{ inputs.feature_unicode }}" == "true" ]; then
            cat << EOF >> release_notes.md
          - **Unicode Fix** - Prevent path traversal and detections using non-printable Unicode
          EOF
          fi
          
          cat << EOF >> release_notes.md
          
          ### 🚀 Performance & Networking
          EOF
          
          if [ "${{ inputs.feature_bbr }}" == "true" ]; then
            cat << EOF >> release_notes.md
          - **BBR** - Improved TCP congestion control
          EOF
          fi
          
          if [ "${{ inputs.feature_ip_set }}" == "true" ]; then
            cat << EOF >> release_notes.md
          - **IP Set & IPv6 NAT** - Advanced firewall capabilities and IPv6 NAT
          EOF
          fi
          
          if [ "${{ inputs.feature_ttl }}" == "true" ]; then
            cat << EOF >> release_notes.md
          - **TTL Target Support** - Network packet manipulation
          EOF
          fi
          
          cat << EOF >> release_notes.md
          - **Optimisation Patches** - Built with \`${{ inputs.optimize_level }}\`
          
          ### 🔧 System Features
          EOF
          
          if [ "${{ inputs.feature_ds }}" == "true" ]; then
            cat << EOF >> release_notes.md
          - **Droidspaces** - Support Portable Linux containers
          EOF
          fi
          
          if [ "${{ inputs.feature_ntsync }}" == "true" ]; then
            cat << EOF >> release_notes.md
          - **NTSync** - High-performance synchronization primitives
          EOF
          fi
          
          cat << EOF >> release_notes.md
          
          ---
          
          ## 📱 Manager Applications
          
          ### Official Manager
          EOF
          if [ "${{ inputs.ksu_type }}" == "KSUN" ]; then
            cat << EOF >> release_notes.md
          - **KernelSU Next Manager**  
            → [GitHub Release](https://github.com/KernelSU-Next/KernelSU-Next/releases)
          EOF
          elif [ "${{ inputs.ksu_type }}" == "KSU" ]; then
            cat << EOF >> release_notes.md
          - **KernelSU Manager**  
            → [GitHub Release](https://github.com/tiann/KernelSU/releases)
          EOF
          fi
          cat << EOF >> release_notes.md
          ### Community Managers
          - **WildKSU Manager** (Recommended for additional features)  
            → [GitHub Release](https://github.com/WildKernels/Wild_KSU/releases)
          
          ### Required Module
          - **KSU SUSFS Module** (Required for SUSFS features)  
            → [GitHub Release](https://github.com/sidex15/ksu_module_susfs/releases)
          
          ### Recommended Flasher
          - **Kernel Flasher** (Required for flashing AnyKernel3 zips and backups)  
            → [GitHub Release](https://github.com/fatalcoder524/KernelFlasher/releases)
          
          ---
          
          ## 📥 Installation Instructions
          
          ### Prerequisites
          - Unlocked bootloader.
          - Backup your current boot image.
          - Have root access using Magisk / KernelSU / Apatch.
          
          ### Via Kernel Flasher
          1. Download the correct AnyKernel3 ZIP for your device.
          2. If you previously used another root method, clean it up first:
              a. **Magisk**: perform a complete uninstall **after flashing the AnyKernel3 ZIP**.
              b. **APatch**: remove /data/adb contents to avoid leftover root conflicts **after flashing**.
          3. Flash the ZIP to the active slot using Kernel Flasher.
          4. Install the corresponding Manager APK.
          5. Open the app and grant permissions.
          6. Reboot the device if you performed any cleanup.
          
          ---
          
          ## 🙏 Credits
          
          - **KernelSU & KernelSU-Next Teams** - Root solution
          - **simonpunk** - SUSFS development
          - **Google** - Android GKI source
          - **Community Contributors** - Patches and networking fixes
          
          ---
          
          **⚡ Built with ❤️ by the community**
          EOF
          
          gh release create "${{ env.NEW_TAG }}" \
            --title "${{ env.RELEASE_NAME }}" \
            --notes-file release_notes.md \
            --draft
            
          for file in $(find ./downloaded-artifacts -name "*.zip" -o -name "*.img"); do
            echo "Uploading $file..."
            gh release upload "${{ env.NEW_TAG }}" "$file"
          done
