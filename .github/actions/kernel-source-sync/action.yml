name: 'Download and configure Kernel Source code'

inputs:
  source_location:
    description: 'Folder path to save Kernel source'
    required: true
    type: string
  github_token:
    description: 'GitHub Token'
    required: true
  debug:
    description: 'Enable Logs'
    required: false
    type: boolean
    default: false

runs:
  using: 'composite'
  steps:
    - name: Prepare Directory and Install Repo
      shell: bash
      run: |
        mkdir -p "${{ inputs.source_location }}"
        mkdir -p ~/.bin
        curl https://storage.googleapis.com/git-repo-downloads/repo > ~/.bin/repo
        chmod a+rx ~/.bin/repo
        echo "$HOME/.bin" >> $GITHUB_PATH

    - name: Sync Kernel Source
      shell: bash
      working-directory: ${{ inputs.source_location }}
      run: |
        echo "::group::Download Manifest Archives"
        # GKI manifests contain nested <include> tags, so we must use 'repo'
        
        # We assume BRANCH is already set in the environment by the caller
        if [ -z "$BRANCH" ]; then
          echo "::error::BRANCH environment variable is not set!"
          exit 1
        fi
        
        echo "Initializing repo for branch: $BRANCH"
        repo init -u https://android.googlesource.com/kernel/manifest -b "$BRANCH" --depth=1
        
        # Google often moves older kernel branches to a 'deprecated/' prefix in the kernel/common repo
        # but forgets to update the manifest files, causing repo sync to fail.
        # This dynamically checks if the branch was deprecated and patches the manifest.
        # Extract the base branch name from the common-* manifest branch
        FORMATTED_BRANCH="${BRANCH#common-}"
        REMOTE_BRANCH=$(git ls-remote https://android.googlesource.com/kernel/common ${FORMATTED_BRANCH})
        
        if echo "$REMOTE_BRANCH" | grep -q "deprecated"; then
          echo "::warning::Detected deprecated branch: $FORMATTED_BRANCH. Patching manifest..."
          sed -i "s/\"${FORMATTED_BRANCH}\"/\"deprecated\/${FORMATTED_BRANCH}\"/g" .repo/manifests/default.xml
        fi
        
        echo "Syncing repositories..."
        repo sync -c -j$(nproc) --no-clone-bundle --no-tags --optimized-fetch
        
        if [ ! -d "common" ]; then
          echo "::error::Kernel source sync failed! 'common' directory not found."
          exit 1
        fi
        
        echo "✅ Kernel source synced successfully."
        echo "::endgroup::"
