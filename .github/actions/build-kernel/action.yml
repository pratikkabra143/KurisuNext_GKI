name: 'Build GKI Kernel'
description: 'Downloads, patches, builds, and packages a GKI kernel'

inputs:
  kernel_version:
    required: true
  ksu_type:
    required: true
  ksu_hash:
    required: true
  susfs_hash:
    required: true
  optimize_level:
    required: true
  clean_build:
    required: true
  debug:
    required: false
    default: 'false'
  build_timestamp:
    required: false
    default: ''
  feature_susfs:
    required: true
  feature_bbg:
    required: true
  feature_bbr:
    required: true
  feature_ttl:
    required: true
  feature_ip_set:
    required: true
  feature_unicode:
    required: true
  feature_ds:
    required: true
  feature_ntsync:
    required: true
  feature_rek:
    required: false
    default: 'false'
  local_version:
    required: false
    default: 'pratikkabra143'
  stealth_mode:
    required: false
    default: 'false'

runs:
  using: 'composite'
  steps:
    - name: Parse Kernel Version
      id: parse
      shell: bash
      run: |
        set -euo pipefail
        KVER="${{ inputs.kernel_version }}"
        IFS='-' read -ra PARTS <<< "$KVER"
        
        VERSION_SUBLEVEL="${PARTS[0]}"
        IFS='.' read -ra VPARTS <<< "$VERSION_SUBLEVEL"
        VERSION_MAJOR="${VPARTS[0]}.${VPARTS[1]}"
        
        # Extract numeric sublevel (e.g., 186 from 5.10.186) for precise fix targeting
        if [ ${#VPARTS[@]} -ge 3 ] && [[ "${VPARTS[2]}" =~ ^[0-9]+$ ]]; then
          SUBLEVEL="${VPARTS[2]}"
        else
          SUBLEVEL="999"  # Assume latest if not parseable (e.g., X in 6.6.X-android15-lts)
        fi
        
        ANDROID_VER="${PARTS[1]}"
        
        if [ "${PARTS[2]}" = "lts" ]; then
          BRANCH="common-${ANDROID_VER}-${VERSION_MAJOR}"
        elif [ "${PARTS[2]}" = "release" ]; then
          BRANCH="common-${ANDROID_VER}-${VERSION_MAJOR}-release"
        else
          # Join all remaining parts to handle suffixes like 2025-05-exp
          SUFFIX=$(IFS='-'; echo "${PARTS[*]:2}")
          BRANCH="common-${ANDROID_VER}-${VERSION_MAJOR}-${SUFFIX}"
        fi
        
        echo "BRANCH=$BRANCH" >> $GITHUB_ENV
        echo "VERSION_MAJOR=$VERSION_MAJOR" >> $GITHUB_ENV
        echo "ANDROID_VER=$ANDROID_VER" >> $GITHUB_ENV
        echo "VERSION_SUBLEVEL=$VERSION_SUBLEVEL" >> $GITHUB_ENV
        echo "SUBLEVEL=$SUBLEVEL" >> $GITHUB_ENV
        
        echo "✅ Detected Branch: $BRANCH"

    - name: Set Paths
      shell: bash
      run: |
        WORKSPACE="${GITHUB_WORKSPACE}"
        echo "WORKSPACE=$WORKSPACE" >> $GITHUB_ENV
        echo "GKI_ROOT=$WORKSPACE/gki_workspace" >> $GITHUB_ENV
        echo "AK3_DIR=$WORKSPACE/AnyKernel3" >> $GITHUB_ENV
        echo "SUSFS_DIR=$WORKSPACE/susfs4ksu" >> $GITHUB_ENV
        echo "PATCHES_DIR=$WORKSPACE/kernel_patches" >> $GITHUB_ENV
        echo "FRAGMENT_FILE=$WORKSPACE/pratik_gki.fragment" >> $GITHUB_ENV
        touch "$WORKSPACE/pratik_gki.fragment"

    - name: Clone Dependencies
      shell: bash
      run: |
        set -euo pipefail
        git clone https://github.com/pratikkabra143/AnyKernel3-GKI.git -b master "$AK3_DIR"
        git clone https://github.com/pratikkabra143/kernel_patches.git "$PATCHES_DIR"
        
        if [ "${{ inputs.feature_susfs }}" = "true" ]; then
          git clone https://gitlab.com/simonpunk/susfs4ksu.git -b master "$SUSFS_DIR"
          if [ -n "${{ inputs.susfs_hash }}" ]; then
            cd "$SUSFS_DIR"
            git checkout "${{ inputs.susfs_hash }}"
            cd -
          fi
        fi



    - name: Clean Up ABI Protected Exports
      shell: bash
      run: |
        set -euo pipefail
        echo "::group::Clean Up ABI Protected Exports"
        cd "$GKI_ROOT"
        rm -f common/android/abi_gki_protected_exports_* || true
        sed -i 's/protected_modules = \[.*\]/protected_modules = []/' common/modules.bzl || true
        echo "::endgroup::"

    - name: Inject KernelSU
      shell: bash
      run: |
        set -euo pipefail
        echo "::group::Add KernelSU / KurisuNext"
        cd "$GKI_ROOT/common"
        
        if [ "${{ inputs.ksu_type }}" = "KSUN" ]; then
          echo "Injecting KurisuNext..."
          if [ -n "${KSU_PRIVATE_TOKEN:-}" ]; then
            git config --global url."https://${KSU_PRIVATE_TOKEN}@github.com/pratikkabra143/KurisuNext".insteadOf "https://github.com/pratikkabra143/KurisuNext"
            curl -H "Authorization: token ${KSU_PRIVATE_TOKEN}" -LSs "https://raw.githubusercontent.com/pratikkabra143/KurisuNext/dev/kernel/setup.sh" | bash -s "${{ inputs.ksu_hash }}"
          else
            curl -LSs "https://raw.githubusercontent.com/pratikkabra143/KurisuNext/dev/kernel/setup.sh" | bash -s "${{ inputs.ksu_hash }}"
          fi
          
          cd KurisuNext/kernel
          COMMITS_COUNT=$(/usr/bin/git rev-list --count HEAD)
          if [ $COMMITS_COUNT -lt 2684 ]; then BASE_VERSION=10200; else BASE_VERSION=30000; fi
          KSU_VERSION=$(expr $COMMITS_COUNT "+" $BASE_VERSION)
          sed -i "s/DKSU_VERSION=11998/DKSU_VERSION=${KSU_VERSION}/" Makefile
          
          cd ..
          KSU_COMMIT_SHA=$(git rev-parse HEAD)
          echo "KSUVER=$KSU_VERSION" >> $GITHUB_ENV
          echo "KSU_COMMIT_SHA=$KSU_COMMIT_SHA" >> $GITHUB_ENV
          cd kernel
          
          if [ -f ksu.c ]; then
            sed -i 's/#if defined(CONFIG_STACKPROTECTOR) && (defined(CONFIG_ARM64) && !defined(CONFIG_STACKPROTECTOR_PER_TASK))/#if 0/' ksu.c
          fi
          
          if [[ "$KSU_VERSION" -gt 33095 ]] && [[ "$VERSION_MAJOR" == "6.12" ]]; then
            sed -i 's|ccflags-y += -I$(KSU_KERNEL_DIR) -I$(KSU_KERNEL_DIR)/include|ccflags-y += -I$(KSU_KERNEL_DIR) -I$(KSU_KERNEL_DIR)/include -I$(KSU_KERNEL_DIR)/include/uapi|' Kbuild
            sed -i 's|$(src)|$(abspath $(src))|' Kbuild
            sed -i 's|$(srctree)/$(src)|$(abspath $(srctree)/$(src))|' Kbuild
          fi

          cd ../..
          
          echo "CONFIG_KSU=y" >> "$FRAGMENT_FILE"
          
        else
          echo "Injecting KernelSU..."
          curl -LSs "https://raw.githubusercontent.com/tiann/KernelSU/main/kernel/setup.sh" | bash -s "${{ inputs.ksu_hash }}"
          
          cd KernelSU/kernel
          BASE_VERSION=30000
          KSU_VERSION=$(expr $(/usr/bin/git rev-list --count HEAD) "+" $BASE_VERSION)
          sed -i "s/DKSU_VERSION=16/DKSU_VERSION=${KSU_VERSION}/" Makefile
          
          cd ..
          KSU_COMMIT_SHA=$(git rev-parse HEAD)
          echo "KSUVER=$KSU_VERSION" >> $GITHUB_ENV
          echo "KSU_COMMIT_SHA=$KSU_COMMIT_SHA" >> $GITHUB_ENV
          cd kernel
          
          if [ -f ksu.c ]; then
            sed -i 's/#if defined(CONFIG_STACKPROTECTOR) && (defined(CONFIG_ARM64) && !defined(CONFIG_STACKPROTECTOR_PER_TASK))/#if 0/' ksu.c
          fi
          
          if [[ "$KSU_VERSION" -gt 32427 ]] && [[ "$VERSION_MAJOR" == "6.12" ]]; then
            sed -i 's|ccflags-y += -I$(KSU_KERNEL_DIR) -I$(KSU_KERNEL_DIR)/include|ccflags-y += -I$(KSU_KERNEL_DIR) -I$(KSU_KERNEL_DIR)/include -I$(KSU_KERNEL_DIR)/include/uapi|' Kbuild
            sed -i 's|$(src)|$(abspath $(src))|' Kbuild
            sed -i 's|$(srctree)/$(src)|$(abspath $(srctree)/$(src))|' Kbuild
          fi

          cd ../..
          
          echo "CONFIG_KSU=y" >> "$FRAGMENT_FILE"
        fi
        echo "::endgroup::"

    - name: Apply SUSFS Patches
      if: ${{ inputs.feature_susfs == 'true' }}
      shell: bash
      run: |
        set -euo pipefail
        echo "::group::Apply SUSFS patches"
        cd "$GKI_ROOT"
        
        # Copy SUSFS core files
        cp -r "$SUSFS_DIR/kernel_patches/fs/"* common/fs/
        cp -r "$SUSFS_DIR/kernel_patches/include/linux/"* common/include/linux/
        
        susfs_version=$(grep '#define SUSFS_VERSION' common/include/linux/susfs.h | awk -F'"' '{print $2}')
        echo "SUSVER=$susfs_version" >> $GITHUB_ENV
        
        cd "$SUSFS_DIR"
        SUSFS_COMMIT_SHA=$(git rev-parse HEAD || echo "unknown")
        echo "SUSFS_COMMIT_SHA=$SUSFS_COMMIT_SHA" >> $GITHUB_ENV
        cd "$GKI_ROOT"

        # Apply KSU integration patch based on version
        case "$susfs_version" in
          "v1.5.8")
            if [ "${{ inputs.ksu_type }}" = "KSUN" ]; then
              cd common/KurisuNext
              patch -p1 --forward --fuzz=3 < "$SUSFS_DIR/kernel_patches/KernelSU/10_enable_susfs_for_ksu.patch" || true
              patch -p1 --forward --fuzz=3 < "$PATCHES_DIR/next/susfs_fix_patches/$susfs_version/fix_apk_sign.c.patch"
              patch -p1 --forward --fuzz=3 < "$PATCHES_DIR/next/susfs_fix_patches/$susfs_version/fix_core_hook.c.patch"
              patch -p1 --forward --fuzz=3 < "$PATCHES_DIR/next/susfs_fix_patches/$susfs_version/fix_selinux.c.patch"
              patch -p1 --forward --fuzz=3 < "$PATCHES_DIR/next/susfs_fix_patches/$susfs_version/fix_ksud.c.patch"
              cd ../..
            else
              cd common/KernelSU
              patch -p1 --forward --fuzz=3 < "$SUSFS_DIR/kernel_patches/KernelSU/10_enable_susfs_for_ksu.patch"
              cd ../..
            fi
            ;;
          "v1.5.9"|"v1.5.10"|"v1.5.11"|"v1.5.12")
            if [ "${{ inputs.ksu_type }}" = "KSUN" ]; then
              cd common/KurisuNext
              patch -p1 --forward < "$SUSFS_DIR/kernel_patches/KernelSU/10_enable_susfs_for_ksu.patch" || true
              for file in $(find ./kernel -maxdepth 2 -name "*.rej" -exec basename {} .rej \;); do
                patch -p1 --forward < "$PATCHES_DIR/next/susfs_fix_patches/$susfs_version/fix_$file.c.patch"
              done
              patch -p1 --forward < "$PATCHES_DIR/next/susfs_fix_patches/$susfs_version/fix_kernel_compat.c.patch"
              cd ../..
            else
              cd common/KernelSU
              patch -p1 --forward < "$SUSFS_DIR/kernel_patches/KernelSU/10_enable_susfs_for_ksu.patch"
              cd ../..
            fi
            ;;
          "v2.0.0"|"v2.1.0")
            if [ "${{ inputs.ksu_type }}" = "KSUN" ]; then
              cd common/KurisuNext
              patch -p1 --forward < "$SUSFS_DIR/kernel_patches/KernelSU/10_enable_susfs_for_ksu.patch" || true
              # Apply all fix patches directly
              for patch_file in "$PATCHES_DIR/next/susfs_fix_patches/$susfs_version"/*.patch; do
                if [ -f "$patch_file" ]; then
                  echo "Applying fix patch: $(basename "$patch_file")"
                  patch -p1 -F3 --forward < "$patch_file" || true
                fi
              done
              cd ../..
            else
              cd common/KernelSU
              patch -p1 --forward < "$SUSFS_DIR/kernel_patches/KernelSU/10_enable_susfs_for_ksu.patch" || true
              cd ../..
            fi
            ;;
        esac
        
        # Determine patch branch mapping
        SUSFS_BRANCH="gki-${ANDROID_VER}-${VERSION_MAJOR}"
        if [ "$ANDROID_VER" = "android12" ]; then SUSFS_BRANCH="gki-android12-5.10"; fi
        
        cd common
        
        if [ "$ANDROID_VER" = "android15" ] && [ "$VERSION_MAJOR" = "6.6" ] && [ "${SUBLEVEL:-999}" -le 58 ]; then
          if ! grep -qxF '#include <trace/hooks/fs.h>' ./fs/namespace.c; then
            echo "Adding missing #include <trace/hooks/fs.h> to fs/namespace.c"
            sed -i '/#include <trace\/hooks\/blk.h>/a #include <trace\/hooks\/fs.h>' ./fs/namespace.c
            echo "NAMESPACE_FS_FIX=true" >> $GITHUB_ENV
          else
            echo "NAMESPACE_FS_FIX=already_present" >> $GITHUB_ENV
          fi
        fi
        
        # Fake kernel patch to fix failures
        fake_patched=0
        if [ "$ANDROID_VER" = "android15" ] && [ "$VERSION_MAJOR" = "6.6" ]; then
          if ! grep -qxF $'\tunsigned int nr_subpages = __PAGE_SIZE / PAGE_SIZE;' ./fs/proc/task_mmu.c; then
            echo "nr_subpages Line not found. Fake Patching!"
            sed -i -e '/int ret = 0, copied = 0;/a \\tunsigned int nr_subpages \= __PAGE_SIZE \/ PAGE_SIZE;' -e '/int ret = 0, copied = 0;/a \\tpagemap_entry_t \*res = NULL;' ./fs/proc/task_mmu.c
            fake_patched=1
            TASK_MMU_VARS_ADDED=1
          else
            TASK_MMU_VARS_ADDED=0
          fi
          
          if ! grep -qxF '#include <linux/dma-buf.h>' ./fs/proc/base.c; then
            echo "#include <linux/dma-buf.h> Line not found. Adding missing header"
            sed -i '/#include <linux\/cpufreq_times.h>/a #include <linux\/dma-buf.h>' ./fs/proc/base.c
          fi
        fi
        
        if [ "$ANDROID_VER" = "android14" ] && [ "$VERSION_MAJOR" = "6.1" ]; then
          if ! grep -qxF $'\tif (!vma_pages(vma))' ./fs/proc/task_mmu.c; then
            echo "vma_pages Line not found. Fake Patching!"
            fake_patched=1
          fi
          
          if ! grep -qxF '#include <linux/dma-buf.h>' ./fs/proc/base.c; then
            echo "#include <linux/dma-buf.h> Line not found. Adding missing header"
            sed -i '/#include <linux\/cpufreq_times.h>/a #include <linux\/dma-buf.h>' ./fs/proc/base.c
          fi
        fi
        
        # Apply core SUSFS patch
        patch -p1 --forward < "$SUSFS_DIR/kernel_patches/50_add_susfs_in_${SUSFS_BRANCH}.patch" || true
        
        # Revert Fake kernel patch
        if [ "$fake_patched" = 1 ]; then
          if [ "$ANDROID_VER" = "android15" ] && [ "$VERSION_MAJOR" = "6.6" ]; then
            if [ "${TASK_MMU_VARS_ADDED:-0}" = "1" ]; then
              echo "Reverting nr_subpages Fake Patching!"
              sed -i -e '/unsigned int nr_subpages \= __PAGE_SIZE \/ PAGE_SIZE;/d' -e '/pagemap_entry_t \*res = NULL;/d' ./fs/proc/task_mmu.c
            fi
          fi
          if [ "$ANDROID_VER" = "android14" ] && [ "$VERSION_MAJOR" = "6.1" ]; then
            if grep -qxF $'\t\t\tgoto show_pad;' ./fs/proc/task_mmu.c; then
              echo "Reverting vma_pages Fake Patching!"
              sed -i -e 's/goto show_pad;/return 0;/' ./fs/proc/task_mmu.c
            fi
          fi
        fi
        
        # Add SUSFS configs (v2.0.0+ only)
        {
          echo "CONFIG_KSU_SUSFS=y"
          echo "CONFIG_KSU_SUSFS_SUS_PATH=y"
          echo "CONFIG_KSU_SUSFS_SUS_MOUNT=y"
          echo "CONFIG_KSU_SUSFS_SUS_KSTAT=y"
          echo "CONFIG_KSU_SUSFS_SPOOF_UNAME=y"
          echo "CONFIG_KSU_SUSFS_ENABLE_LOG=y"
          echo "CONFIG_KSU_SUSFS_HIDE_KSU_SUSFS_SYMBOLS=y"
          echo "CONFIG_KSU_SUSFS_SPOOF_CMDLINE_OR_BOOTCONFIG=y"
          echo "CONFIG_KSU_SUSFS_OPEN_REDIRECT=y"
          echo "CONFIG_KSU_SUSFS_SUS_MAP=y"
        } >> "$FRAGMENT_FILE"

    - name: Apply Other Patches
      shell: bash
      run: |
        set -euo pipefail
        echo "::group::Apply Other patches"
        cd "$GKI_ROOT/common"
        KERNEL_VERSION="${VERSION_MAJOR}"
        MIN_VERSION="5.16"
        
        # Glibc 2.38+ Compatibility Fixes
        GLIBC_VERSION="$(ldd --version 2>/dev/null | head -n 1 | awk '{print $NF}')"
        echo "Detected GLIBC version: $GLIBC_VERSION"
        MAKEFILE_FIXED="skipped"
        PARSE_OPTIONS_FIXED="skipped"
        if [ "$(printf '%s\n' "2.38" "$GLIBC_VERSION" | sort -V | head -n 1)" = "2.38" ]; then
          # Fix 1: resolve_btfids Makefile EXTRA_CFLAGS fix
          if [ -f tools/bpf/resolve_btfids/Makefile ]; then
            if grep -q '$(Q)$(MAKE) -C $(SUBCMD_SRC) OUTPUT=$(abspath $(dir $@))/ $(abspath $@)' tools/bpf/resolve_btfids/Makefile; then
              echo "Applying resolve_btfids Makefile EXTRA_CFLAGS fix..."
              sed -i '/$(Q)$(MAKE) -C $(SUBCMD_SRC) OUTPUT=$(abspath $(dir $@))\/ $(abspath $@)/s//$(Q)$(MAKE) -C $(SUBCMD_SRC) EXTRA_CFLAGS="$(CFLAGS)" OUTPUT=$(abspath $(dir $@))\/ $(abspath $@)/' tools/bpf/resolve_btfids/Makefile
              MAKEFILE_FIXED="true"
            elif grep -q 'EXTRA_CFLAGS' tools/bpf/resolve_btfids/Makefile; then
              echo "resolve_btfids Makefile EXTRA_CFLAGS already present."
              MAKEFILE_FIXED="already_fixed"
            else
              echo "resolve_btfids Makefile pattern not found."
              MAKEFILE_FIXED="not_found"
            fi
          fi
        
          # Fix 2: parse-options.c C99 variable declaration fix for older kernels
          NEEDS_PARSE_FIX=false
          if { [ "$ANDROID_VER" = "android12" ] && [ "$VERSION_MAJOR" = "5.10" ]; } || \
             { [ "$ANDROID_VER" = "android13" ] && [ "$VERSION_MAJOR" = "5.10" ] && [ "${SUBLEVEL:-999}" -le 186 ]; } || \
             { [ "$ANDROID_VER" = "android13" ] && [ "$VERSION_MAJOR" = "5.15" ] && [ "${SUBLEVEL:-999}" -le 119 ]; } || \
             { [ "$ANDROID_VER" = "android14" ] && [ "$VERSION_MAJOR" = "5.15" ] && [ "${SUBLEVEL:-999}" -le 110 ]; }; then
            NEEDS_PARSE_FIX=true
          fi
          if [ "$NEEDS_PARSE_FIX" = "true" ]; then
            echo "Applying Glibc 2.38 fix for parse-options.c..."
            sed -i '/char \*buf = NULL;/a int i;' tools/lib/subcmd/parse-options.c 2>/dev/null || true
            sed -i 's/for (int i = 0; subcommands\[i\]; i++) {/for (i = 0; subcommands[i]; i++) {/' tools/lib/subcmd/parse-options.c 2>/dev/null || true
            sed -i '/if (subcommands) {/a int i;' tools/lib/subcmd/parse-options.c 2>/dev/null || true
            sed -i 's/for (int i = 0; subcommands\[i\]; i++)/for (i = 0; subcommands[i]; i++)/' tools/lib/subcmd/parse-options.c 2>/dev/null || true
            PARSE_OPTIONS_FIXED="true"
          fi
        else
          echo "GLIBC < 2.38, skipping Makefile and parse-options.c fixes."
        fi
        
        # Fix 3: mm/mmap.c VM_PAD_MASK API compatibility
        MMAP_VM_FLAGS_FIX="not_applicable"
        if { [ "$ANDROID_VER" = "android12" ] && [ "$VERSION_MAJOR" = "5.10" ] && [ "${SUBLEVEL:-0}" -eq 226 ]; } || \
           { [ "$ANDROID_VER" = "android13" ] && [ "$VERSION_MAJOR" = "5.10" ] && [ "${SUBLEVEL:-0}" -eq 223 ]; } || \
           { [ "$ANDROID_VER" = "android13" ] && [ "$VERSION_MAJOR" = "5.15" ] && [ "${SUBLEVEL:-0}" -eq 167 ]; } || \
           { [ "$ANDROID_VER" = "android14" ] && [ "$VERSION_MAJOR" = "5.15" ] && [ "${SUBLEVEL:-0}" -eq 167 ]; }; then
          if [ -f mm/mmap.c ]; then
            echo "Applying mm/mmap.c VM_PAD_MASK fix..."
            sed -i 's/\s*vm_flags_clear(new_vma, VM_PAD_MASK);/                new_vma->vm_flags \&= ~VM_PAD_MASK;/' mm/mmap.c
            MMAP_VM_FLAGS_FIX="true"
          fi
        fi
        
        # Samsung & Xiaomi 6.6 ABI Compatibility (WiFi/Bluetooth fix)
        if [ "$ANDROID_VER" = "android15" ] && [ "$VERSION_MAJOR" = "6.6" ]; then
          echo "Patching ABI symbols for Samsung/Xiaomi compatibility..."

          # Samsung: Add KDP symbols, apply patch, and integrate min_kdp driver
          SAMSUNG_SYMBOL_LIST=android/abi_gki_aarch64_galaxy
          if [ -f "$SAMSUNG_SYMBOL_LIST" ]; then
            echo "kdp_set_cred_non_rcu" >> "$SAMSUNG_SYMBOL_LIST"
            echo "kdp_usecount_dec_and_test" >> "$SAMSUNG_SYMBOL_LIST"
            echo "kdp_usecount_inc" >> "$SAMSUNG_SYMBOL_LIST"

            SAMSUNG_PATCH="$PATCHES_DIR/samsung/min_kdp/add-min_kdp-symbols.patch"
            if [ -f "$SAMSUNG_PATCH" ]; then
              if patch -p1 --dry-run < "$SAMSUNG_PATCH"; then
                patch -p1 --no-backup-if-mismatch < "$SAMSUNG_PATCH"
              fi
            fi

            if [ -f "$PATCHES_DIR/samsung/min_kdp/min_kdp.c" ]; then
              cp "$PATCHES_DIR/samsung/min_kdp/min_kdp.c" drivers/min_kdp.c
              echo "obj-y += min_kdp.o" >> drivers/Makefile
            fi
          fi

          # Xiaomi: Add missing device_find_any_child symbol
          XIAOMI_SYMBOL_LIST=android/abi_gki_aarch64_xiaomi
          if [ -f "$XIAOMI_SYMBOL_LIST" ]; then
            echo "device_find_any_child" >> "$XIAOMI_SYMBOL_LIST"
          fi
        fi
        
        if [ "$(printf '%s\n' "$KERNEL_VERSION" "$MIN_VERSION" | sort -V | head -n1)" = "$KERNEL_VERSION" ]; then
          echo "Patching ptrace!"
          patch -p1 -F 3 < "$PATCHES_DIR/gki_ptrace.patch" || true
        else
          echo "Kernel >= $MIN_VERSION, skipping ptrace patch"
        fi
        
        echo "Patching optimized_mem_operations.patch!"
        patch -p1 --forward < "$PATCHES_DIR/common/optimized_mem_operations.patch" || true
        echo "Patching file_struct_8bytes_align.patch!"
        patch -p1 --forward < "$PATCHES_DIR/common/file_struct_8bytes_align.patch" || true
        echo "Patching reduce_cache_pressure.patch!"
        patch -p1 --forward < "$PATCHES_DIR/common/reduce_cache_pressure.patch" || true
        echo "Patching mem_opt_prefetch.patch!"
        patch -p1 --forward < "$PATCHES_DIR/common/mem_opt_prefetch.patch" || true
        
        if [ "$(printf '%s\n' "$KERNEL_VERSION" "$MIN_VERSION" | sort -V | tail -n1)" = "$KERNEL_VERSION" ]; then
          patch -p1 --forward < "$PATCHES_DIR/common/optimise_memcmp.patch" || true
        elif [ "$(printf '%s\n' "$KERNEL_VERSION" "5.11" | sort -V | tail -n1)" = "$KERNEL_VERSION" ]; then
          sed -e 's/SYM_FUNC_START(__pi_memcmp)/SYM_FUNC_START_WEAK_PI(memcmp)/' -e 's/SYM_FUNC_END(__pi_memcmp)/SYM_FUNC_END_PI(memcmp)/' -e 's/SYM_FUNC_ALIAS_WEAK(memcmp, __pi_memcmp)/EXPORT_SYMBOL_NOKASAN(memcmp)/' "$PATCHES_DIR/common/optimise_memcmp.patch" | patch -p1 --forward || true
        fi
        
        echo "Patching minimise_wakeup_time.patch!"
        patch -p1 --forward < "$PATCHES_DIR/common/minimise_wakeup_time.patch" || true
        echo "Patching int_sqrt.patch!"
        patch -p1 --forward < "$PATCHES_DIR/common/int_sqrt.patch" || true
        echo "Patching force_tcp_nodelay.patch!"
        patch -p1 --forward < "$PATCHES_DIR/common/force_tcp_nodelay.patch" || true
        echo "Patching reduce_gc_thread_sleep_time.patch!"
        patch -p1 --forward < "$PATCHES_DIR/common/reduce_gc_thread_sleep_time.patch" || true
        echo "Patching add_timeout_wakelocks_globally.patch!"
        patch -p1 --forward < "$PATCHES_DIR/common/add_timeout_wakelocks_globally.patch" || true
        echo "Patching f2fs_reduce_congestion.patch!"
        patch -p1 --forward < "$PATCHES_DIR/common/f2fs_reduce_congestion.patch" || true
        echo "Patching reduce_freeze_timeout.patch!"
        patch -p1 --forward < "$PATCHES_DIR/common/reduce_freeze_timeout.patch" || true
        
        if [ "$(printf '%s\n' "$KERNEL_VERSION" "$MIN_VERSION" | sort -V | head -n1)" = "$KERNEL_VERSION" ]; then
          patch -p1 --forward < "$PATCHES_DIR/common/clear_page_16bytes_align.patch" || true
        else
          cat "$PATCHES_DIR/common/clear_page_16bytes_align.patch" | sed -e 's/SYM_FUNC_START_PI(clear_page)/SYM_FUNC_START_PI(__pi_clear_page)/' | patch -p1 -F3 --forward || true
        fi
        
        # echo "Patching add_limitation_scaling_min_freq.patch!"
        # patch -p1 -F3 --forward < "$PATCHES_DIR/common/add_limitation_scaling_min_freq.patch" || true
        # echo "Patching re_write_limitation_scaling_min_freq.patch!"
        # patch -p1 -F3 --forward < "$PATCHES_DIR/common/re_write_limitation_scaling_min_freq.patch" || true
        echo "Patching adjust_cpu_scan_order.patch!"
        patch -p1 -F3 --forward < "$PATCHES_DIR/common/adjust_cpu_scan_order.patch" || true
        echo "Patching avoid_extra_s2idle_wake_attempts.patch!"
        patch -p1 -F3 --forward < "$PATCHES_DIR/common/avoid_extra_s2idle_wake_attempts.patch" || true
        echo "Patching disable_cache_hot_buddy.patch!"
        patch -p1 -F3 --forward < "$PATCHES_DIR/common/disable_cache_hot_buddy.patch" || true
        echo "Patching f2fs_enlarge_min_fsync_blocks.patch!"
        patch -p1 -F3 --forward < "$PATCHES_DIR/common/f2fs_enlarge_min_fsync_blocks.patch" || true
        echo "Patching increase_ext4_default_commit_age.patch!"
        patch -p1 -F3 --forward < "$PATCHES_DIR/common/increase_ext4_default_commit_age.patch" || true
        echo "Patching increase_sk_mem_packets.patch!"
        patch -p1 -F3 --forward < "$PATCHES_DIR/common/increase_sk_mem_packets.patch" || true
        echo "Patching reduce_pci_pme_wakeups.patch!"
        patch -p1 -F3 --forward < "$PATCHES_DIR/common/reduce_pci_pme_wakeups.patch" || true
        echo "Patching silence_irq_cpu_logspam.patch!"
        patch -p1 -F3 --forward < "$PATCHES_DIR/common/silence_irq_cpu_logspam.patch" || true
        echo "Patching silence_system_logspam.patch!"
        patch -p1 -F3 --forward < "$PATCHES_DIR/common/silence_system_logspam.patch" || true
        # echo "Patching use_unlikely_wrap_cpufreq.patch!"
        # patch -p1 -F3 --forward < "$PATCHES_DIR/common/use_unlikely_wrap_cpufreq.patch" || true
        
        echo "✅ Other patches applied"
        
        # Kernel Fixes Summary
        echo "## Kernel Fixes Summary" >> "$GITHUB_STEP_SUMMARY"
        echo "" >> "$GITHUB_STEP_SUMMARY"
        echo "**Kernel Version:** ${ANDROID_VER} + ${VERSION_MAJOR} (sublevel ${SUBLEVEL:-unknown})" >> "$GITHUB_STEP_SUMMARY"
        echo "" >> "$GITHUB_STEP_SUMMARY"
        echo "### Fix Status" >> "$GITHUB_STEP_SUMMARY"
        
        if [ "$(printf '%s\n' "2.38" "${GLIBC_VERSION:-0}" | sort -V | head -n 1)" = "2.38" ]; then
          echo "- Makefile EXTRA_CFLAGS fix: ${MAKEFILE_FIXED:-skipped}" >> "$GITHUB_STEP_SUMMARY"
          echo "- parse-options.c fix: ${PARSE_OPTIONS_FIXED:-skipped}" >> "$GITHUB_STEP_SUMMARY"
        else
          echo "- Makefile EXTRA_CFLAGS fix: skipped (GLIBC < 2.38)" >> "$GITHUB_STEP_SUMMARY"
          echo "- parse-options.c fix: skipped (GLIBC < 2.38)" >> "$GITHUB_STEP_SUMMARY"
        fi
        echo "- fs/namespace.c include fix: ${NAMESPACE_FS_FIX:-not_applicable}" >> "$GITHUB_STEP_SUMMARY"
        echo "- mm/mmap.c VM_PAD_MASK fix: ${MMAP_VM_FLAGS_FIX:-not_applicable}" >> "$GITHUB_STEP_SUMMARY"
        echo "::endgroup::"

    - name: Integrate Re-Kernel
      shell: bash
      if: ${{ inputs.feature_rek == 'true' }}
      run: |
        set -euo pipefail
        echo "::group::Integrate Re-Kernel"
        cd "$GKI_ROOT"
        TMP_REKERNEL=/tmp/rekernel
        rm -rf "$TMP_REKERNEL"
        git clone --depth 1 https://github.com/Sakion-Team/Re-Kernel.git "$TMP_REKERNEL"

        # Prepare driver source
        mkdir -p common/drivers/rekernel
        cp "$TMP_REKERNEL/LKM-Source/rekernel.c" common/drivers/rekernel/
        cp "$TMP_REKERNEL/LKM-Source/rekernel.h" common/drivers/rekernel/

        # Generate Kconfig
        cat > common/drivers/rekernel/Kconfig << 'EOF'
        menu "Re:Kernel"
        config REKERNEL
            bool "Re:Kernel support (GKI Vendor Hooks)"
            default y
            help
              Enable Re-Kernel support via GKI Vendor Hooks.

        config REKERNEL_NETWORK
            bool "Re:Kernel NetReceive unfreeze support"
            depends on REKERNEL
            default n
        endmenu
        EOF

        # Generate Makefile
        cat > common/drivers/rekernel/Makefile << 'EOF'
        obj-$(CONFIG_REKERNEL) += rekernel.o
        ccflags-$(CONFIG_REKERNEL_NETWORK) += -DNETWORK_FILTER
        EOF

        # Mount to driver tree
        if ! grep -qF 'source "drivers/rekernel/Kconfig"' common/drivers/Kconfig; then
          sed -i '/^endmenu$/i source "drivers/rekernel/Kconfig"' common/drivers/Kconfig
        fi
        if ! grep -qF 'obj-$(CONFIG_REKERNEL) += rekernel/' common/drivers/Makefile; then
          echo 'obj-$(CONFIG_REKERNEL) += rekernel/' >> common/drivers/Makefile
        fi

        # Enable Kernel Version Macro
        REKERNEL_H="common/drivers/rekernel/rekernel.h"
        VERSION_MACRO="KERNEL_$(echo "$VERSION_MAJOR" | tr '.' '_')"
        if grep -q "^// #define ${VERSION_MACRO}$" "$REKERNEL_H"; then
          sed -i "s|^// #define ${VERSION_MACRO}$|#define ${VERSION_MACRO}|" "$REKERNEL_H"
        fi

        # Fix header include path
        sed -i 's|#include <../android/binder_internal.h>|#include "../../drivers/android/binder_internal.h"|g' common/drivers/rekernel/rekernel.c
        # Add seq_file dependency
        grep -qF '#include <linux/seq_file.h>' common/drivers/rekernel/rekernel.c || sed -i '/#include <trace\/hooks\/signal.h>/a #include <linux/seq_file.h>' common/drivers/rekernel/rekernel.c

        # Add to fragment
        echo "CONFIG_REKERNEL=y" >> "$FRAGMENT_FILE"
        echo "CONFIG_REKERNEL_NETWORK=y" >> "$FRAGMENT_FILE"
        
        echo "✅ Re-Kernel integrated"
        echo "::endgroup::"

