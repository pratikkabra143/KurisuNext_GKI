name: 'Build GKI Kernel'
description: 'Downloads, patches, builds, and packages a GKI kernel'

inputs:
  kernel_version:
    required: true
  ksu_type:
    required: true
  ksu_hash:
    required: true
  susfs_hash:
    required: true
  optimize_level:
    required: true
  clean_build:
    required: true
  debug:
    required: false
    default: 'false'
  build_timestamp:
    required: false
    default: ''
  feature_susfs:
    required: true
  feature_bbg:
    required: true
  feature_bbr:
    required: true
  feature_ttl:
    required: true
  feature_ip_set:
    required: true
  feature_unicode:
    required: true
  feature_ds:
    required: true
  feature_ntsync:
    required: true
  feature_rek:
    required: false
    default: 'false'
  local_version:
    required: false
    default: 'pratikkabra143'

runs:
  using: 'composite'
  steps:
    - name: Parse Kernel Version
      id: parse
      shell: bash
      run: |
        set -euo pipefail
        KVER="${{ inputs.kernel_version }}"
        IFS='-' read -ra PARTS <<< "$KVER"
        
        VERSION_SUBLEVEL="${PARTS[0]}"
        IFS='.' read -ra VPARTS <<< "$VERSION_SUBLEVEL"
        VERSION_MAJOR="${VPARTS[0]}.${VPARTS[1]}"
        
        ANDROID_VER="${PARTS[1]}"
        
        if [ "${PARTS[2]}" = "lts" ]; then
          BRANCH="common-${ANDROID_VER}-${VERSION_MAJOR}"
        elif [ "${PARTS[2]}" = "release" ]; then
          BRANCH="common-${ANDROID_VER}-${VERSION_MAJOR}-release"
        else
          # Join all remaining parts to handle suffixes like 2025-05-exp
          SUFFIX=$(IFS='-'; echo "${PARTS[*]:2}")
          BRANCH="common-${ANDROID_VER}-${VERSION_MAJOR}-${SUFFIX}"
        fi
        
        echo "BRANCH=$BRANCH" >> $GITHUB_ENV
        echo "VERSION_MAJOR=$VERSION_MAJOR" >> $GITHUB_ENV
        echo "CURRENT_SUB=${VPARTS[2]}" >> $GITHUB_ENV
        echo "ANDROID_VER=$ANDROID_VER" >> $GITHUB_ENV
        echo "VERSION_SUBLEVEL=$VERSION_SUBLEVEL" >> $GITHUB_ENV
        
        echo "✅ Detected Branch: $BRANCH"

    - name: Set Paths
      shell: bash
      run: |
        WORKSPACE="${GITHUB_WORKSPACE}"
        echo "WORKSPACE=$WORKSPACE" >> $GITHUB_ENV
        echo "GKI_ROOT=$WORKSPACE/gki_workspace" >> $GITHUB_ENV
        echo "AK3_DIR=$WORKSPACE/AnyKernel3" >> $GITHUB_ENV
        echo "SUSFS_DIR=$WORKSPACE/susfs4ksu" >> $GITHUB_ENV
        echo "PATCHES_DIR=$WORKSPACE/kernel_patches" >> $GITHUB_ENV
        echo "FRAGMENT_FILE=$WORKSPACE/pratik_gki.fragment" >> $GITHUB_ENV
        touch "$WORKSPACE/pratik_gki.fragment"

    - name: Clone Dependencies
      shell: bash
      run: |
        set -euo pipefail
        git clone https://github.com/pratikkabra143/AnyKernel3-GKI.git -b master "$AK3_DIR"
        git clone https://github.com/TheWildJames/kernel_patches.git "$PATCHES_DIR"
        
        if [ "${{ inputs.feature_susfs }}" = "true" ]; then
          git clone https://gitlab.com/simonpunk/susfs4ksu.git -b master "$SUSFS_DIR"
          if [ -n "${{ inputs.susfs_hash }}" ]; then
            cd "$SUSFS_DIR"
            git checkout "${{ inputs.susfs_hash }}"
            cd -
          fi
        fi



    - name: Clean Up ABI Protected Exports
      shell: bash
      run: |
        set -euo pipefail
        echo "::group::Clean Up ABI Protected Exports"
        cd "$GKI_ROOT"
        rm -f common/android/abi_gki_protected_exports_* || true
        sed -i 's/protected_modules = \[.*\]/protected_modules = []/' common/modules.bzl || true
        echo "::endgroup::"

    - name: Inject KernelSU
      shell: bash
      run: |
        set -euo pipefail
        echo "::group::Add KernelSU / KernelSU-Next"
        cd "$GKI_ROOT/common"
        
        if [ "${{ inputs.ksu_type }}" = "KSUN" ]; then
          echo "Injecting KernelSU-Next..."
          if [ -n "${KSU_PRIVATE_TOKEN:-}" ]; then
            git config --global url."https://${KSU_PRIVATE_TOKEN}@github.com/pratikkabra143/KernelSU-Next".insteadOf "https://github.com/pratikkabra143/KernelSU-Next"
            curl -H "Authorization: token ${KSU_PRIVATE_TOKEN}" -LSs "https://raw.githubusercontent.com/pratikkabra143/KernelSU-Next/dev/kernel/setup.sh" | bash -s "${{ inputs.ksu_hash }}"
          else
            curl -LSs "https://raw.githubusercontent.com/pratikkabra143/KernelSU-Next/dev/kernel/setup.sh" | bash -s "${{ inputs.ksu_hash }}"
          fi
          
          cd KernelSU-Next/kernel
          COMMITS_COUNT=$(/usr/bin/git rev-list --count HEAD)
          if [ $COMMITS_COUNT -lt 2684 ]; then BASE_VERSION=10200; else BASE_VERSION=30000; fi
          KSU_VERSION=$(expr $COMMITS_COUNT "+" $BASE_VERSION)
          sed -i "s/DKSU_VERSION=11998/DKSU_VERSION=${KSU_VERSION}/" Makefile
          
          cd ..
          KSU_COMMIT_SHA=$(git rev-parse HEAD)
          echo "KSUVER=$KSU_VERSION" >> $GITHUB_ENV
          echo "KSU_COMMIT_SHA=$KSU_COMMIT_SHA" >> $GITHUB_ENV
          cd kernel
          
          if [ -f ksu.c ]; then
            sed -i 's/#if defined(CONFIG_STACKPROTECTOR) && (defined(CONFIG_ARM64) && !defined(CONFIG_STACKPROTECTOR_PER_TASK))/#if 0/' ksu.c
          fi
          
          if [[ "$KSU_VERSION" -gt 33095 ]] && [[ "$VERSION_MAJOR" == "6.12" ]]; then
            sed -i 's|ccflags-y += -I$(KSU_KERNEL_DIR) -I$(KSU_KERNEL_DIR)/include|ccflags-y += -I$(KSU_KERNEL_DIR) -I$(KSU_KERNEL_DIR)/include -I$(KSU_KERNEL_DIR)/include/uapi|' Kbuild
            sed -i 's|$(src)|$(abspath $(src))|' Kbuild
            sed -i 's|$(srctree)/$(src)|$(abspath $(srctree)/$(src))|' Kbuild
          fi

          cd ../..
          
          echo "CONFIG_KSU=y" >> "$FRAGMENT_FILE"
          
        else
          echo "Injecting KernelSU..."
          curl -LSs "https://raw.githubusercontent.com/tiann/KernelSU/main/kernel/setup.sh" | bash -s "${{ inputs.ksu_hash }}"
          
          cd KernelSU/kernel
          BASE_VERSION=30000
          KSU_VERSION=$(expr $(/usr/bin/git rev-list --count HEAD) "+" $BASE_VERSION)
          sed -i "s/DKSU_VERSION=16/DKSU_VERSION=${KSU_VERSION}/" Makefile
          
          cd ..
          KSU_COMMIT_SHA=$(git rev-parse HEAD)
          echo "KSUVER=$KSU_VERSION" >> $GITHUB_ENV
          echo "KSU_COMMIT_SHA=$KSU_COMMIT_SHA" >> $GITHUB_ENV
          cd kernel
          
          if [ -f ksu.c ]; then
            sed -i 's/#if defined(CONFIG_STACKPROTECTOR) && (defined(CONFIG_ARM64) && !defined(CONFIG_STACKPROTECTOR_PER_TASK))/#if 0/' ksu.c
          fi
          
          if [[ "$KSU_VERSION" -gt 32427 ]] && [[ "$VERSION_MAJOR" == "6.12" ]]; then
            sed -i 's|ccflags-y += -I$(KSU_KERNEL_DIR) -I$(KSU_KERNEL_DIR)/include|ccflags-y += -I$(KSU_KERNEL_DIR) -I$(KSU_KERNEL_DIR)/include -I$(KSU_KERNEL_DIR)/include/uapi|' Kbuild
            sed -i 's|$(src)|$(abspath $(src))|' Kbuild
            sed -i 's|$(srctree)/$(src)|$(abspath $(srctree)/$(src))|' Kbuild
          fi

          cd ../..
          
          echo "CONFIG_KSU=y" >> "$FRAGMENT_FILE"
        fi
        echo "::endgroup::"

    - name: Apply SUSFS Patches
      if: ${{ inputs.feature_susfs == 'true' }}
      shell: bash
      run: |
        set -euo pipefail
        echo "::group::Apply SUSFS patches"
        cd "$GKI_ROOT"
        
        # Copy SUSFS core files
        cp -r "$SUSFS_DIR/kernel_patches/fs/"* common/fs/
        cp -r "$SUSFS_DIR/kernel_patches/include/linux/"* common/include/linux/
        
        susfs_version=$(grep '#define SUSFS_VERSION' common/include/linux/susfs.h | awk -F'"' '{print $2}')
        echo "SUSVER=$susfs_version" >> $GITHUB_ENV
        
        cd "$SUSFS_DIR"
        SUSFS_COMMIT_SHA=$(git rev-parse HEAD || echo "unknown")
        echo "SUSFS_COMMIT_SHA=$SUSFS_COMMIT_SHA" >> $GITHUB_ENV
        cd "$GKI_ROOT"

        # Apply KSU integration patch based on version
        case "$susfs_version" in
          "v2.0.0"|"v2.1.0")
            if [ "${{ inputs.ksu_type }}" = "KSUN" ]; then
              cd common/KernelSU-Next
              patch -p1 --forward < "$SUSFS_DIR/kernel_patches/KernelSU/10_enable_susfs_for_ksu.patch" || true
              for file in $(find ./kernel -maxdepth 2 -name "*.rej" -exec basename {} .rej \;); do
                patch -p1 --forward < "$PATCHES_DIR/next/susfs_fix_patches/$susfs_version/fix_$file.patch" || true
              done
              patch -p1 --forward < "$PATCHES_DIR/next/susfs_fix_patches/$susfs_version/overwrite_hook_mode.patch" || true
              patch -p1 --forward < "$PATCHES_DIR/next/susfs_fix_patches/$susfs_version/ksu_toolkit.patch" || true
              cd ../..
            else
              cd common/KernelSU
              patch -p1 --forward < "$SUSFS_DIR/kernel_patches/KernelSU/10_enable_susfs_for_ksu.patch" || true
              cd ../..
            fi
            ;;
          *)
            if [ "${{ inputs.ksu_type }}" = "KSUN" ]; then
              cd common/KernelSU-Next
              patch -p1 --forward < "$SUSFS_DIR/kernel_patches/KernelSU/10_enable_susfs_for_ksu.patch" || true
              for file in $(find ./kernel -maxdepth 2 -name "*.rej" -exec basename {} .rej \;); do
                patch -p1 --forward < "$PATCHES_DIR/next/susfs_fix_patches/$susfs_version/fix_$file.patch" || true
              done
              patch -p1 --forward < "$PATCHES_DIR/next/susfs_fix_patches/$susfs_version/overwrite_hook_mode.patch" || true
              patch -p1 --forward < "$PATCHES_DIR/next/susfs_fix_patches/$susfs_version/ksu_toolkit.patch" || true
              cd ../..
            else
              cd common/KernelSU
              patch -p1 --forward < "$SUSFS_DIR/kernel_patches/KernelSU/10_enable_susfs_for_ksu.patch" || true
              cd ../..
            fi
            ;;
        esac
        
        # Determine patch branch mapping
        SUSFS_BRANCH="gki-${ANDROID_VER}-${VERSION_MAJOR}"
        if [ "$ANDROID_VER" = "android12" ]; then SUSFS_BRANCH="gki-android12-5.10"; fi
        
        cd common
        
        if [ "$ANDROID_VER" = "android15" ] && [ "$VERSION_MAJOR" = "6.6" ]; then
          if ! grep -qxF '#include <trace/hooks/fs.h>' ./fs/namespace.c; then
            sed -i '/#include <trace\/hooks\/blk.h>/a #include <trace\/hooks\/fs.h>' ./fs/namespace.c
          fi
        fi
        
        # Apply core SUSFS patch
        patch -p1 --forward < "$SUSFS_DIR/kernel_patches/50_add_susfs_in_${SUSFS_BRANCH}.patch" || true
        
        # Apply version-specific fixes based on sub-level
        if [[ "$CURRENT_SUB" =~ ^[0-9]+$ ]]; then
          if [[ "$ANDROID_VER" == "android12" && "$VERSION_MAJOR" == "5.10" ]]; then
            if [[ "$CURRENT_SUB" -le 209 ]]; then
              sed -i -e 's/goto show_pad;/return 0;/' ./fs/proc/task_mmu.c
            fi
            if [[ "$CURRENT_SUB" -le 117 ]]; then
              cp "$PATCHES_DIR/wild/susfs_fix_patches/${susfs_version}/a12-5.10/fdinfo.c.patch" ./
              patch -p1 < fdinfo.c.patch || true
              sed -i 's/inotify_mark_user_mask(mark)/mark->mask \& IN_ALL_EVENTS/g' ./fs/notify/fdinfo.c
            fi
            if [[ "$CURRENT_SUB" -le 43 ]]; then
              cp "$PATCHES_DIR/wild/susfs_fix_patches/${susfs_version}/a12-5.10/base.c.patch" ./
              patch -p1 < base.c.patch || true
            fi
            if grep -q 'vm_flags_clear(new_vma, VM_PAD_MASK)' ./mm/mmap.c; then
              sed -i 's/vm_flags_clear(new_vma, VM_PAD_MASK);/new_vma->vm_flags \&= ~VM_PAD_MASK;/g' ./mm/mmap.c
            fi
          fi
          
          if [[ "$ANDROID_VER" == "android13" && "$VERSION_MAJOR" == "5.15" ]]; then
            if [[ "$CURRENT_SUB" -le 41 ]]; then
              cp "$PATCHES_DIR/wild/susfs_fix_patches/${susfs_version}/a13-5.15/namespace.c.patch" ./
              patch -p1 < namespace.c.patch || true
              cp "$PATCHES_DIR/wild/susfs_fix_patches/${susfs_version}/a13-5.15/fdinfo.c.patch" ./
              patch -p1 < fdinfo.c.patch || true
              cp "$PATCHES_DIR/wild/susfs_fix_patches/${susfs_version}/a13-5.15/open.c.patch" ./
              patch -p1 < open.c.patch || true
            fi
            if grep -q 'vm_flags_clear(new_vma, VM_PAD_MASK)' ./mm/mmap.c; then
              sed -i 's/vm_flags_clear(new_vma, VM_PAD_MASK);/new_vma->vm_flags \&= ~VM_PAD_MASK;/g' ./mm/mmap.c
            fi
            if [[ "$CURRENT_SUB" -le 148 ]]; then
              sed -i -e 's/goto show_pad;/return 0;/' ./fs/proc/task_mmu.c
            fi
          fi
          
          if [[ "$ANDROID_VER" == "android14" && "$VERSION_MAJOR" == "6.1" ]]; then
            if [[ "$CURRENT_SUB" -le 141 || "$CURRENT_SUB" -ge 145 ]]; then
              cp "$PATCHES_DIR/wild/susfs_fix_patches/${susfs_version}/a14-6.1/base.c.patch" ./
              patch -p1 < base.c.patch || true
            fi
            if ! grep -qF '#include <linux/dma-buf.h>' ./fs/proc/base.c; then
              sed -i '/#include <linux\/cpufreq_times.h>/a #include <linux\/dma-buf.h>' ./fs/proc/base.c
            fi
            if grep -q 'susfs_is_current_proc_umounted' ./fs/proc/base.c && ! grep -qF '#include <linux/susfs.h>' ./fs/proc/base.c; then
              sed -i '/#include <linux\/dma-buf.h>/a #include <linux\/susfs.h>' ./fs/proc/base.c
            fi
            if [[ "$CURRENT_SUB" -le 75 ]]; then
              sed -i -e 's/goto show_pad;/return 0;/' ./fs/proc/task_mmu.c
            fi
            if grep -q 'DEFAULT_KSU_MNT_ID\|susfs_mnt_id_ida' ./fs/namespace.c && ! grep -qF '#include <linux/susfs_def.h>' ./fs/namespace.c; then
              sed -i '/#include <linux\/mnt_idmapping.h>/a #ifdef CONFIG_KSU_SUSFS_SUS_MOUNT\n#include <linux\/susfs_def.h>\n#endif' ./fs/namespace.c
              if ! grep -q 'extern bool susfs_is_current_ksu_domain' ./fs/namespace.c; then
                sed -i '/#include "internal.h"/a \\n#ifdef CONFIG_KSU_SUSFS_SUS_MOUNT\nextern bool susfs_is_current_ksu_domain(void);\nextern struct static_key_false susfs_is_sdcard_android_data_not_decrypted;\nextern bool susfs_is_sdcard_android_data_decrypted __read_mostly;\n\n#define CL_COPY_MNT_NS BIT(25)\n\nstatic __maybe_unused DEFINE_IDA(susfs_mnt_id_ida);\nstatic __maybe_unused DEFINE_IDA(susfs_mnt_group_ida);\n\n#endif' ./fs/namespace.c
              fi
            fi
          fi
          
          if [[ "$ANDROID_VER" == "android15" && "$VERSION_MAJOR" == "6.6" ]]; then
            if [[ "$CURRENT_SUB" -ge 98 ]]; then
              cp "$PATCHES_DIR/wild/susfs_fix_patches/${susfs_version}/a15-6.6/base.c.patch" ./
              patch -p1 < base.c.patch || true
            fi
            if grep -q 'AS_FLAGS_SUS_MAP\|susfs_is_current_proc_umounted' ./fs/proc/base.c && ! grep -qF 'susfs_def.h' ./fs/proc/base.c; then
              if ! grep -qF '#include <linux/dma-buf.h>' ./fs/proc/base.c; then
                sed -i '/#include <linux\/cpufreq_times.h>/a #include <linux\/dma-buf.h>' ./fs/proc/base.c
              fi
              sed -i '/#include <linux\/dma-buf.h>/a #endif' ./fs/proc/base.c
              sed -i '/#include <linux\/dma-buf.h>/a #include <linux\/susfs_def.h>' ./fs/proc/base.c
              sed -i '/#include <linux\/dma-buf.h>/a #ifdef CONFIG_KSU_SUSFS_SUS_MAP' ./fs/proc/base.c
            fi
            if grep -q 'SUSFS_IS_INODE_SUS_MAP\|SUSFS_IS_INODE_OPEN_REDIRECT' ./fs/proc/base.c && ! grep -qF '#include <linux/susfs.h>' ./fs/proc/base.c; then
              if ! grep -qF '#include <linux/dma-buf.h>' ./fs/proc/base.c; then
                sed -i '/#include <linux\/cpufreq_times.h>/a #include <linux\/dma-buf.h>' ./fs/proc/base.c
              fi
              sed -i '/#include <linux\/dma-buf.h>/a #include <linux\/susfs.h>' ./fs/proc/base.c
            fi
            if [[ "$CURRENT_SUB" -le 58 ]]; then
              cp "$PATCHES_DIR/wild/susfs_fix_patches/${susfs_version}/a15-6.6/task_mmu.c.patch" ./
              patch -p1 < task_mmu.c.patch || true
            fi
          fi
          
          if [[ "$ANDROID_VER" == "android16" && "$VERSION_MAJOR" == "6.12" ]]; then
            SETUID_HOOK="$GKI_ROOT/common/drivers/kernelsu/setuid_hook.c"
            if [ -f "$SETUID_HOOK" ]; then
              sed -i 's/defined(CONFIG_KSU_MANUAL_HOOK))/!defined(CONFIG_KSU_SUSFS) \&\& defined(CONFIG_KSU_MANUAL_HOOK))/' "$SETUID_HOOK"
            fi
            if grep -q 'susfs_is_current_proc_umounted' ./fs/exec.c && ! grep -qF '#include <linux/susfs_def.h>' ./fs/exec.c; then
              sed -i '/#include <linux\/ksm\.h>/a #ifdef CONFIG_KSU_SUSFS\n#include <linux\/susfs_def.h>\n#endif' ./fs/exec.c
            fi
          fi
        fi
        
        # Add SUSFS configs (v2.0.0+ only)
        {
          echo "CONFIG_KSU_SUSFS=y"
          echo "CONFIG_KSU_SUSFS_SUS_PATH=y"
          echo "CONFIG_KSU_SUSFS_SUS_MOUNT=y"
          echo "CONFIG_KSU_SUSFS_SUS_KSTAT=y"
          echo "CONFIG_KSU_SUSFS_SPOOF_UNAME=y"
          echo "CONFIG_KSU_SUSFS_ENABLE_LOG=y"
          echo "CONFIG_KSU_SUSFS_HIDE_KSU_SUSFS_SYMBOLS=y"
          echo "CONFIG_KSU_SUSFS_SPOOF_CMDLINE_OR_BOOTCONFIG=y"
          echo "CONFIG_KSU_SUSFS_OPEN_REDIRECT=y"
          echo "CONFIG_KSU_SUSFS_SUS_MAP=y"
        } >> "$FRAGMENT_FILE"

    - name: Apply Other Patches
      shell: bash
      run: |
        set -euo pipefail
        echo "::group::Apply Other patches"
        cd "$GKI_ROOT/common"
        KERNEL_VERSION="${VERSION_MAJOR}"
        MIN_VERSION="5.16"
        
        # Glibc 2.38 Compatibility Fix for older kernels
        if [ "$VERSION_MAJOR" = "5.10" ] || [ "$VERSION_MAJOR" = "5.15" ]; then
          echo "Applying Glibc 2.38 fix for parse-options.c..."
          sed -i '/char \*buf = NULL;/a int i;' tools/lib/subcmd/parse-options.c 2>/dev/null || true
          sed -i 's/for (int i = 0; subcommands\[i\]; i++) {/for (i = 0; subcommands[i]; i++) {/' tools/lib/subcmd/parse-options.c 2>/dev/null || true
          sed -i '/if (subcommands) {/a int i;' tools/lib/subcmd/parse-options.c 2>/dev/null || true
          sed -i 's/for (int i = 0; subcommands\[i\]; i++)/for (i = 0; subcommands[i]; i++)/' tools/lib/subcmd/parse-options.c 2>/dev/null || true
        fi
        
        # Samsung & Xiaomi 6.6 ABI Compatibility
        if [ "$ANDROID_VER" = "android15" ] && [ "$VERSION_MAJOR" = "6.6" ]; then
          echo "Patching ABI symbols for Samsung/Xiaomi compatibility..."
          if [ -f android/abi_gki_aarch64_galaxy ]; then
            grep -q "kdp_set_cred_non_rcu" android/abi_gki_aarch64_galaxy || echo "  kdp_set_cred_non_rcu" >> android/abi_gki_aarch64_galaxy
            grep -q "min_kdp" android/abi_gki_aarch64_galaxy || echo "  min_kdp" >> android/abi_gki_aarch64_galaxy
          fi
          if [ -f android/abi_gki_aarch64_xiaomi ]; then
            grep -q "device_find_any_child" android/abi_gki_aarch64_xiaomi || echo "  device_find_any_child" >> android/abi_gki_aarch64_xiaomi
          fi
        fi
        
        if [ "$(printf '%s\n' "$KERNEL_VERSION" "$MIN_VERSION" | sort -V | head -n1)" = "$KERNEL_VERSION" ]; then
          echo "Patching ptrace!"
          patch -p1 -F 3 < "$PATCHES_DIR/gki_ptrace.patch" || true
        else
          echo "Kernel >= $MIN_VERSION, skipping ptrace patch"
        fi
        
        echo "Patching optimized_mem_operations.patch!"
        patch -p1 --forward < "$PATCHES_DIR/common/optimized_mem_operations.patch" || true
        echo "Patching file_struct_8bytes_align.patch!"
        patch -p1 --forward < "$PATCHES_DIR/common/file_struct_8bytes_align.patch" || true
        echo "Patching reduce_cache_pressure.patch!"
        patch -p1 --forward < "$PATCHES_DIR/common/reduce_cache_pressure.patch" || true
        echo "Patching mem_opt_prefetch.patch!"
        patch -p1 --forward < "$PATCHES_DIR/common/mem_opt_prefetch.patch" || true
        
        if [ "$(printf '%s\n' "$KERNEL_VERSION" "$MIN_VERSION" | sort -V | tail -n1)" = "$KERNEL_VERSION" ]; then
          patch -p1 --forward < "$PATCHES_DIR/common/optimise_memcmp.patch" || true
        elif [ "$(printf '%s\n' "$KERNEL_VERSION" "5.11" | sort -V | tail -n1)" = "$KERNEL_VERSION" ]; then
          sed -e 's/SYM_FUNC_START(__pi_memcmp)/SYM_FUNC_START_WEAK_PI(memcmp)/' -e 's/SYM_FUNC_END(__pi_memcmp)/SYM_FUNC_END_PI(memcmp)/' -e 's/SYM_FUNC_ALIAS_WEAK(memcmp, __pi_memcmp)/EXPORT_SYMBOL_NOKASAN(memcmp)/' "$PATCHES_DIR/common/optimise_memcmp.patch" | patch -p1 --forward || true
        fi
        
        echo "Patching minimise_wakeup_time.patch!"
        patch -p1 --forward < "$PATCHES_DIR/common/minimise_wakeup_time.patch" || true
        echo "Patching int_sqrt.patch!"
        patch -p1 --forward < "$PATCHES_DIR/common/int_sqrt.patch" || true
        echo "Patching force_tcp_nodelay.patch!"
        patch -p1 --forward < "$PATCHES_DIR/common/force_tcp_nodelay.patch" || true
        echo "Patching reduce_gc_thread_sleep_time.patch!"
        patch -p1 --forward < "$PATCHES_DIR/common/reduce_gc_thread_sleep_time.patch" || true
        echo "Patching add_timeout_wakelocks_globally.patch!"
        patch -p1 --forward < "$PATCHES_DIR/common/add_timeout_wakelocks_globally.patch" || true
        echo "Patching f2fs_reduce_congestion.patch!"
        patch -p1 --forward < "$PATCHES_DIR/common/f2fs_reduce_congestion.patch" || true
        echo "Patching reduce_freeze_timeout.patch!"
        patch -p1 --forward < "$PATCHES_DIR/common/reduce_freeze_timeout.patch" || true
        
        if [ "$(printf '%s\n' "$KERNEL_VERSION" "$MIN_VERSION" | sort -V | head -n1)" = "$KERNEL_VERSION" ]; then
          patch -p1 --forward < "$PATCHES_DIR/common/clear_page_16bytes_align.patch" || true
        else
          cat "$PATCHES_DIR/common/clear_page_16bytes_align.patch" | sed -e 's/SYM_FUNC_START_PI(clear_page)/SYM_FUNC_START_PI(__pi_clear_page)/' | patch -p1 -F3 --forward || true
        fi
        
        # echo "Patching add_limitation_scaling_min_freq.patch!"
        # patch -p1 -F3 --forward < "$PATCHES_DIR/common/add_limitation_scaling_min_freq.patch" || true
        # echo "Patching re_write_limitation_scaling_min_freq.patch!"
        # patch -p1 -F3 --forward < "$PATCHES_DIR/common/re_write_limitation_scaling_min_freq.patch" || true
        echo "Patching adjust_cpu_scan_order.patch!"
        patch -p1 -F3 --forward < "$PATCHES_DIR/common/adjust_cpu_scan_order.patch" || true
        echo "Patching avoid_extra_s2idle_wake_attempts.patch!"
        patch -p1 -F3 --forward < "$PATCHES_DIR/common/avoid_extra_s2idle_wake_attempts.patch" || true
        echo "Patching disable_cache_hot_buddy.patch!"
        patch -p1 -F3 --forward < "$PATCHES_DIR/common/disable_cache_hot_buddy.patch" || true
        echo "Patching f2fs_enlarge_min_fsync_blocks.patch!"
        patch -p1 -F3 --forward < "$PATCHES_DIR/common/f2fs_enlarge_min_fsync_blocks.patch" || true
        echo "Patching increase_ext4_default_commit_age.patch!"
        patch -p1 -F3 --forward < "$PATCHES_DIR/common/increase_ext4_default_commit_age.patch" || true
        echo "Patching increase_sk_mem_packets.patch!"
        patch -p1 -F3 --forward < "$PATCHES_DIR/common/increase_sk_mem_packets.patch" || true
        echo "Patching reduce_pci_pme_wakeups.patch!"
        patch -p1 -F3 --forward < "$PATCHES_DIR/common/reduce_pci_pme_wakeups.patch" || true
        echo "Patching silence_irq_cpu_logspam.patch!"
        patch -p1 -F3 --forward < "$PATCHES_DIR/common/silence_irq_cpu_logspam.patch" || true
        echo "Patching silence_system_logspam.patch!"
        patch -p1 -F3 --forward < "$PATCHES_DIR/common/silence_system_logspam.patch" || true
        # echo "Patching use_unlikely_wrap_cpufreq.patch!"
        # patch -p1 -F3 --forward < "$PATCHES_DIR/common/use_unlikely_wrap_cpufreq.patch" || true
        
        echo "✅ Other patches applied"
        echo "::endgroup::"

    - name: Integrate Re-Kernel
      shell: bash
      if: ${{ inputs.feature_rek == 'true' }}
      run: |
        set -euo pipefail
        echo "::group::Integrate Re-Kernel"
        cd "$GKI_ROOT/common"
        git clone https://github.com/Sakion-Team/Re-Kernel.git ./re-kernel
        cd ./re-kernel
        chmod +x ./install.sh
        ./install.sh
        echo "✅ Re-Kernel integrated"
        echo "::endgroup::"

    - name: Add BBG
      shell: bash
      if: ${{ inputs.feature_bbg == 'true' }}
      run: |
        set -euo pipefail
        echo "::group::Add BBG LSM"
        cd "$GKI_ROOT/common"
        curl -LSs https://github.com/vc-teahouse/Baseband-guard/raw/main/setup.sh | bash -s main || true
        echo "CONFIG_BBG=y" >> "$FRAGMENT_FILE"
        sed -i '/^config LSM$/,/^help$/{ /^[[:space:]]*default/ { /baseband_guard/! s/selinux/selinux,baseband_guard/ } }' security/Kconfig
        echo "✅ BBG LSM added"
        echo "::endgroup::"

    - name: Add BBR
      shell: bash
      if: ${{ inputs.feature_bbr == 'true' }}
      run: |
        set -euo pipefail
        echo "Add BBR"
        cd "$GKI_ROOT/common"
        cat >> "$FRAGMENT_FILE" <<EOF
        CONFIG_TCP_CONG_ADVANCED=y
        CONFIG_TCP_CONG_BBR=y
        CONFIG_NET_SCH_FQ=y
        CONFIG_NET_SCH_FQ_CODEL=y
        EOF

    - name: Add TTL Target Support
      shell: bash
      if: ${{ inputs.feature_ttl == 'true' }}
      run: |
        set -euo pipefail
        echo "Add TTL Target Support"
        cd "$GKI_ROOT/common"
        cat >> "$FRAGMENT_FILE" <<EOF
        CONFIG_IP_NF_TARGET_TTL=y
        CONFIG_IP6_NF_TARGET_HL=y
        CONFIG_IP6_NF_MATCH_HL=y
        EOF

    - name: Add IP SET & IPv6_NAT Support
      shell: bash
      if: ${{ inputs.feature_ip_set == 'true' }}
      run: |
        set -euo pipefail
        echo "Add IP SET & IPv6_NAT Support"
        cd "$GKI_ROOT/common"
        cat >> "$FRAGMENT_FILE" <<EOF
        CONFIG_IP_SET=y
        CONFIG_IP_SET_MAX=65534
        CONFIG_IP_SET_BITMAP_IP=y
        CONFIG_IP_SET_BITMAP_IPMAC=y
        CONFIG_IP_SET_BITMAP_PORT=y
        CONFIG_IP_SET_HASH_IP=y
        CONFIG_IP_SET_HASH_IPMARK=y
        CONFIG_IP_SET_HASH_IPPORT=y
        CONFIG_IP_SET_HASH_IPPORTIP=y
        CONFIG_IP_SET_HASH_IPPORTNET=y
        CONFIG_IP_SET_HASH_IPMAC=y
        CONFIG_IP_SET_HASH_MAC=y
        CONFIG_IP_SET_HASH_NETPORTNET=y
        CONFIG_IP_SET_HASH_NET=y
        CONFIG_IP_SET_HASH_NETNET=y
        CONFIG_IP_SET_HASH_NETPORT=y
        CONFIG_IP_SET_HASH_NETIFACE=y
        CONFIG_IP_SET_LIST_SET=y
        CONFIG_NETFILTER_XT_MATCH_ADDRTYPE=y
        CONFIG_NETFILTER_XT_SET=y
        CONFIG_IP6_NF_NAT=y
        CONFIG_IP6_NF_TARGET_MASQUERADE=y
        EOF
        patch -p1 -F 3 < "$PATCHES_DIR/common/IPv6_NAT_FIX.patch" || true

    - name: Apply Droidspaces Patch
      shell: bash
      if: ${{ inputs.feature_ds == 'true' }}
      run: |
        set -euo pipefail
        echo "::group::Apply Droidspaces Patch"
        cd "$GKI_ROOT/common"
        if [ "$ANDROID_VER" = "android16" ] && [ "$VERSION_MAJOR" = "6.12" ]; then
          patch -p1 --forward < "$PATCHES_DIR/common/droidspaces/fix_sysvipc_kabi_a16-6.12.patch" || true
        elif [ "$ANDROID_VER" = "android12" ] && [ "$VERSION_MAJOR" = "5.10" ]; then
          patch -p1 --forward < "$PATCHES_DIR/common/droidspaces/fix_sysvipc_kabi_bypass_a16-6.12_below.patch" || true
          patch -p1 --forward < "$PATCHES_DIR/common/droidspaces/fix_abi_padding_for_posix_mqueue.patch" || true
        else
          patch -p1 --forward < "$PATCHES_DIR/common/droidspaces/fix_sysvipc_kabi_6_7_8.patch" || true
        fi
        
        patch -p1 --forward < "$PATCHES_DIR/common/droidspaces/0001-Return-ghost-task-if-task-is-null-and-is-requested-b.patch" || true
        
        cat >> "$FRAGMENT_FILE" <<EOF
        CONFIG_SYSVIPC=y
        CONFIG_DEVTMPFS=y
        CONFIG_PID_NS=y
        CONFIG_POSIX_MQUEUE=y
        CONFIG_NETFILTER_XT_TARGET_LOG=y
        CONFIG_NETFILTER_XT_MATCH_RECENT=y
        EOF
        echo "✅ Droidspaces patch applied"
        echo "::endgroup::"

    - name: Apply NTSync Patch
      shell: bash
      if: ${{ inputs.feature_ntsync == 'true' }}
      run: |
        set -euo pipefail
        echo "::group::Apply NTSync Patch"
        cd "$GKI_ROOT/common"
        if [ -f "$PATCHES_DIR/common/ntsync/ntsync_compat_${ANDROID_VER}-${VERSION_MAJOR}.patch" ]; then
          patch -p1 --forward < "$PATCHES_DIR/common/ntsync/ntsync_compat_${ANDROID_VER}-${VERSION_MAJOR}.patch" || true
        fi
        patch -p1 --forward < "$PATCHES_DIR/common/ntsync/ntsync_base.patch" || true
        echo "CONFIG_NTSYNC=y" >> "$FRAGMENT_FILE"
        
        if [ "$ANDROID_VER" = "android16" ] && [ "$VERSION_MAJOR" = "6.12" ]; then
          rm -f include/uapi/linux/ntsync.h || true
          rm -f drivers/misc/ntsync.c || true
        fi
        echo "✅ NTSync patch applied"
        echo "::endgroup::"

    - name: Apply Unicode Fix Patch
      shell: bash
      if: ${{ inputs.feature_unicode == 'true' }}
      run: |
        set -euo pipefail
        echo "::group::Apply Unicode Fix Patch"
        cd "$GKI_ROOT/common"
        if [ "$(printf '%s\n' "$VERSION_MAJOR" "5.16" | sort -V | head -n1)" = "$VERSION_MAJOR" ]; then
            patch -p1 --forward < "$PATCHES_DIR/common/unicode_bypass_fix_6.1-.patch" || true
        else
            patch -p1 --forward < "$PATCHES_DIR/common/unicode_bypass_fix_6.1+.patch" || true
        fi
        echo "✅ Unicode Fix patch applied"
        echo "::endgroup::"

    - name: Add Tmpfs Support
      shell: bash
      run: |
        set -euo pipefail
        echo "Add Tmpfs Support"
        cd "$GKI_ROOT/common"
        cat >> "$FRAGMENT_FILE" <<EOF
        CONFIG_TMPFS_XATTR=y
        CONFIG_TMPFS_POSIX_ACL=y
        EOF

    - name: Add Build based configs
      shell: bash
      run: |
        set -euo pipefail
        echo "Add Build based configs"
        cd "$GKI_ROOT/common"
        if [ "${{ inputs.optimize_level }}" = "O3" ]; then
          echo "CONFIG_CC_OPTIMIZE_FOR_PERFORMANCE=n" >> "$FRAGMENT_FILE"
        else
          echo "CONFIG_CC_OPTIMIZE_FOR_PERFORMANCE=y" >> "$FRAGMENT_FILE"
        fi
        cat >> "$FRAGMENT_FILE" <<EOF
        CONFIG_FRAME_WARN=0
        CONFIG_TRACEPOINTS=y
        EOF

    - name: Compile Kernel
      shell: bash
      run: |
        set -euo pipefail
        cd "$GKI_ROOT"
        
        # Localversion branding
        RAW_LOCALVERSION="${{ inputs.local_version }}"
        if [ -z "$RAW_LOCALVERSION" ]; then
          LOCALVERSION="-pratikkabra143"
        else
          LOCALVERSION="-$RAW_LOCALVERSION"
        fi
        echo "LOCALVERSION=$LOCALVERSION" >> $GITHUB_ENV
        
        # Build Timestamp support
        if [ -n "${{ inputs.build_timestamp }}" ]; then
          DATESTR="${{ inputs.build_timestamp }}"
          echo "📅 Using custom build timestamp: $DATESTR"
        else
          DATESTR="$(TZ='UTC' date +'%a %b %d %T %Z %Y')"
          echo "📅 Using current UTC build timestamp: $DATESTR"
        fi
        export KBUILD_BUILD_TIMESTAMP="$DATESTR"
        echo "KBUILD_BUILD_TIMESTAMP=$DATESTR" >> $GITHUB_ENV
        echo "KBUILD_BUILD_VERSION=1" >> $GITHUB_ENV
        
        # Patch mkcompile_h to hardcode timestamp (survives Bazel sandbox)
        MKCOMPILE="common/scripts/mkcompile_h"
        if [ -f "$MKCOMPILE" ]; then
          if grep -q 'UTS_VERSION=' "$MKCOMPILE"; then
            perl -pi -e "s{UTS_VERSION=\"\\\$\\\(.*?\\\)\"}{UTS_VERSION=\"#1 SMP PREEMPT $DATESTR\"}" "$MKCOMPILE"
          fi
        fi
        
        # Build System Selector
        # Add LOCALVERSION to fragment
        echo "CONFIG_LOCALVERSION=\"$LOCALVERSION\"" >> "$FRAGMENT_FILE"
        
        echo "📋 Custom config fragment contents:"
        cat "$FRAGMENT_FILE"
        
        if [ -f "tools/bazel" ]; then
          echo "Using Bazel build system..."
          # Strip strict GKI validation checks that block custom configs
          sed -i 's/check_defconfig//' common/build.config.gki 2>/dev/null || true
          sed -i 's/BUILD_SYSTEM_DLKM=1/BUILD_SYSTEM_DLKM=0/' common/build.config.gki.aarch64 2>/dev/null || true
          sed -i '/MODULES_ORDER=android\/gki_aarch64_modules/d' common/build.config.gki.aarch64 2>/dev/null || true
          sed -i '/KMI_SYMBOL_LIST_STRICT_MODE/d' common/build.config.gki.aarch64 2>/dev/null || true
          sed -i '/protected_exports_list.*abi_gki_protected_exports_aarch64/d' common/BUILD.bazel
          sed -i '/kmi_symbol_list_strict_mode/d' common/BUILD.bazel
          rm -rf common/android/abi_gki_protected_exports_* 2>/dev/null || true
          # Sanitize ABI symbol lists — SUSFS patches corrupt these INI files,
          # causing flatten_symbol_list.py ConfigParser crash
          for abi_file in common/android/abi_gki_aarch64*; do
            if [ -f "$abi_file" ]; then
              echo "[abi_symbol_list]" > "$abi_file"
            fi
          done
          # Remove -dirty / -maybe-dirty from version strings
          sed -i 's/-dirty//' common/scripts/setlocalversion 2>/dev/null || true
          sed -i '/stable_scmversion_cmd/s/-maybe-dirty//g' build/kernel/kleaf/impl/stamp.bzl 2>/dev/null || true
          
          # Copy fragment into the kernel source tree for Bazel to reference
          cp "$FRAGMENT_FILE" common/arch/arm64/configs/pratik_gki.fragment
          # Register the fragment in BUILD.bazel so Bazel can resolve the target
          echo 'exports_files(["arch/arm64/configs/pratik_gki.fragment"])' >> common/BUILD.bazel
          
          # LTO selection: 6.12+ uses lto=none (Rust modules incompatible with thin LTO)
          LTO_FLAG="--lto=thin"
          if [ "$VERSION_MAJOR" = "6.12" ]; then
            LTO_FLAG="--lto=none"
          fi
          
          # Build with --config=fast and --notrim to skip KMI symbol list processing entirely
          tools/bazel build --disk_cache=/home/runner/.cache/bazel --config=fast --notrim $LTO_FLAG --defconfig_fragment=//common:arch/arm64/configs/pratik_gki.fragment //common:kernel_aarch64
          
          IMG_PATH="bazel-bin/common/kernel_aarch64/Image"
          BOOT_PATH=""
          
        else
          echo "Using build.sh system..."
          cd common
          # Legacy build.sh uses GKI_DEFCONFIG_FRAGMENT
          BUILD_CONFIG=common/build.config.gki.aarch64
          export LTO=thin
          export SKIP_MRPROPER=1
          export SKIP_DEFCONFIG=0
          export BUILD_BOOT_IMG=1
          GKI_DEFCONFIG_FRAGMENT="$FRAGMENT_FILE" ../build/build.sh
          
          # Dynamically locate outputs since older versions write to out/<branch>/dist/
          IMG_PATH=$(find ../out -type f -name "Image" -path "*/dist/Image" | head -n1 || echo "")
          BOOT_PATH=$(find ../out -type f -name "boot.img" -path "*/dist/boot.img" | head -n1 || echo "")
          if [ -z "$IMG_PATH" ]; then
            IMG_PATH=$(find ../out -type f -name "Image" | head -n1 || echo "")
          fi
          if [ -z "$BOOT_PATH" ]; then
            BOOT_PATH=$(find ../out -type f -name "boot.img" | head -n1 || echo "")
          fi
          
          # Remove leading '../' for relative path resolution below
          IMG_PATH="${IMG_PATH#../}"
          BOOT_PATH="${BOOT_PATH#../}"
          cd ..
        fi
        
        if [ ! -f "$IMG_PATH" ]; then
          echo "::error::Build Failed! Image not found."
          exit 1
        fi
        
        echo "IMG_PATH=$GKI_ROOT/$IMG_PATH" >> $GITHUB_ENV
        echo "BOOT_PATH=$GKI_ROOT/$BOOT_PATH" >> $GITHUB_ENV

    - name: Package AnyKernel3 & Sign Boot
      shell: bash
      run: |
        set -euo pipefail
        
        # AnyKernel3 Setup
        cp "$IMG_PATH" "$AK3_DIR/"
        cd "$AK3_DIR"
        sed -i 's/do.check_boot_version=.*/do.check_boot_version=1/' anykernel.sh
        
        if [ "${{ inputs.feature_susfs }}" = "true" ]; then
          ZIP_NAME="AK3_GKI_${ANDROID_VER}-${VERSION_MAJOR}_${{ inputs.ksu_type }}_${KSUVER:-unknown}_SuSFS_${SUSVER:-unknown}.zip"
        else
          ZIP_NAME="AK3_GKI_${ANDROID_VER}-${VERSION_MAJOR}_${{ inputs.ksu_type }}_${KSUVER:-unknown}.zip"
        fi
        zip -r9 "$ZIP_NAME" * -x "*.git*" "README.md"
        
        # Artifacts dir
        mkdir -p "$WORKSPACE/artifacts"
        mv "$ZIP_NAME" "$WORKSPACE/artifacts/"
        echo "ZIP_NAME=$ZIP_NAME" >> $GITHUB_ENV
        
        # Boot Image Signing
        if [ -f "$BOOT_PATH" ]; then
          echo "Signing boot image..."
          cd "$WORKSPACE"
          wget -q https://android.googlesource.com/platform/external/avb/+archive/refs/heads/master.tar.gz -O avb.tar.gz
          tar -xzf avb.tar.gz avbtool.py
          chmod +x avbtool.py
          
          # If secret is set, sign it
          if [ -n "${BOOT_SIGN_KEY:-}" ]; then
            printf "%s\n" "$BOOT_SIGN_KEY" > rsa2048.pem
            ./avbtool.py add_hash_footer \
              --image "$BOOT_PATH" \
              --partition_size 67108864 \
              --partition_name boot \
              --key rsa2048.pem \
              --algorithm SHA256_RSA2048
              
            mv "$BOOT_PATH" "$WORKSPACE/artifacts/boot_GKI_${ANDROID_VER}-${VERSION_MAJOR}_signed.img"
          else
            echo "::warning::BOOT_SIGN_KEY not set. Cannot sign boot.img."
            mv "$BOOT_PATH" "$WORKSPACE/artifacts/boot_GKI_${ANDROID_VER}-${VERSION_MAJOR}_unsigned.img"
          fi
        fi

    - name: Final Build Summary
      shell: bash
      run: |
        set -euo pipefail
        {
          echo "### 🎯 Kernel Build Summary"
          echo ""
          echo "| Metric | Value |"
          echo "|--------|-------|"
          echo "| **GKI Kernel** | \`${ANDROID_VER}-${VERSION_MAJOR}\` |"
          if [ "${{ inputs.ksu_type }}" = "KSUN" ]; then
            echo "| **KSUN Version** | ${KSUVER:-unknown} |"
          else
            echo "| **KSU Version** | ${KSUVER:-unknown} |"
          fi
          
          KSU_SHA="${KSU_COMMIT_SHA:-unknown}"
          if [ "$KSU_SHA" != "unknown" ]; then
            if [ "${{ inputs.ksu_type }}" = "KSUN" ]; then
              echo "| **KSUN Commit** | [\`${KSU_SHA:0:8}\`](https://github.com/pratikkabra143/KernelSU-Next/commit/$KSU_SHA) |"
            else
              echo "| **KSU Commit** | [\`${KSU_SHA:0:8}\`](https://github.com/tiann/KernelSU/commit/$KSU_SHA) |"
            fi
          else
            echo "| **KSU Commit** | unknown |"
          fi
          
          if [ "${{ inputs.feature_susfs }}" = "true" ]; then
            echo "| **SUSFS Version** | ${SUSVER:-unknown} |"
            SUSFS_SHA="${SUSFS_COMMIT_SHA:-unknown}"
            if [ "$SUSFS_SHA" != "unknown" ]; then
              echo "| **SUSFS Commit** | [\`${SUSFS_SHA:0:8}\`](https://gitlab.com/simonpunk/susfs4ksu/-/commit/$SUSFS_SHA) |"
            else
              echo "| **SUSFS Commit** | unknown |"
            fi
          fi
          
          echo ""
          echo "### 🔧 GKI Features"
          echo ""
          echo "| Feature | Status |"
          echo "|---------|--------|"
          echo "| **BBR** | ${{ inputs.feature_bbr }} |"
          echo "| **BBG** | ${{ inputs.feature_bbg }} |"
          echo "| **TTL** | ${{ inputs.feature_ttl }} |"
          echo "| **IP_SET & IPv6 NAT** | ${{ inputs.feature_ip_set }} |"
          echo "| **Unicode Fix** | ${{ inputs.feature_unicode }} |"
          echo "| **NTSync** | ${{ inputs.feature_ntsync }} |"
          echo "| **Droidspaces** | ${{ inputs.feature_ds }} |"
          
          echo ""
          echo "### 📊 Build Metrics"
          echo ""
          echo "| Metric | Value |"
          echo "|--------|-------|"
          echo "| **Optimization** | ${{ inputs.optimize_level }} |"
          echo "| **Clean Build** | ${{ inputs.clean_build }} |"
          echo "| **Artifact Name** | \`${{ env.ZIP_NAME }}\` |"
        } >> "$GITHUB_STEP_SUMMARY"

    - name: Upload Artifacts
      uses: actions/upload-artifact@v4
      with:
        name: ${{ env.ZIP_NAME }}
        path: ${{ github.workspace }}/artifacts/*
